<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#003366;--secondary:#cc0000;--light:#f4f7f6;--accent:#fbbf24;
  --white:#ffffff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;

}
body{font-family:'Poppins',sans-serif;background:var(--light);color:var(--text)}
.hidden{display:none!important}
@keyframes spin{to{transform:rotate(360deg)}}
.navbar{background:var(--primary);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--primary)}
.nav-title h1{font-size:15px;font-weight:700;color:white;line-height:1.2}
.nav-title p{font-size:11px;color:rgba(255,255,255,0.65)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-link{padding:6px 14px;color:rgba(255,255,255,0.8);border:none;background:transparent;cursor:pointer;font-size:13px;border-radius:6px;text-decoration:none}
.nav-link:hover{background:rgba(255,255,255,0.12);color:white}
.notif-wrap{position:relative;cursor:pointer;padding:6px 8px;border-radius:6px}
.notif-wrap:hover{background:rgba(255,255,255,0.1)}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--secondary);display:none}
.btn-logout{padding:6px 14px;background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:6px;cursor:pointer;font-size:12px}
.admin-layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 60px)}
.sidebar{background:var(--primary);padding:12px 0}
.sb-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:0.08em;padding:10px 16px 4px;text-transform:uppercase}

.sb-btn:hover{background:rgba(255,255,255,0.08);color:white}
.sb-btn.active{background:rgba(255,255,255,0.16);color:white;font-weight:700;border-left:3px solid var(--accent)}
.sb-btn .ic{width:17px;text-align:center;font-size:14px}
.bc{background:var(--secondary);color:white;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto}
.main-panel{padding:22px;background:var(--light);overflow-y:auto;min-height:calc(100vh - 60px)}
.ph{margin-bottom:18px}
.ph h2{font-size:19px;font-weight:700;color:var(--primary)}
.ph p{font-size:12px;color:var(--muted);margin-top:3px}

.card-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sg4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.sc2{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:14px}
.sc2-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.sc2-val{font-size:20px;font-weight:700;color:var(--primary)}

.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.tbl th{text-align:left;padding:9px 10px;background:#f8fafc;font-weight:700;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 10px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.tbl tr:hover td{background:#fafafa}
.av{width:30px;height:30px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--primary);flex-shrink:0}
.chart-wrap{position:relative;width:100%;height:220px}
.chart-wrap-lg{position:relative;width:100%;height:270px}
.leg{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-sq{width:10px;height:10px;border-radius:2px}
.frow{margin-bottom:14px}

.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.loader-box{background:white;border-radius:14px;padding:32px 40px;text-align:center}

.profile-modal-bg.open{display:flex}
.profile-modal{background:var(--white);border-radius:16px;width:100%;max-width:660px;overflow:hidden;margin:auto}
.pm-header{background:var(--primary);padding:20px 24px;color:white;display:flex;justify-content:space-between;align-items:center}
.pm-header h3{font-size:16px;font-weight:700}
.pm-body{padding:24px;max-height:80vh;overflow-y:auto}
.notif-panel{position:fixed;top:60px;right:0;width:330px;background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;z-index:250;box-shadow:0 10px 30px rgba(0,0,0,0.15);display:none;max-height:500px;overflow-y:auto}

@media(max-width:768px){
  .admin-layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .sg4,.sg3{grid-template-columns:1fr 1fr}
  .info-grid{grid-template-columns:1fr}
}
</style>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8Lcwa0h_tDLFBWkEKMfOn8hAdJ_5gn9nUzHpuBgruBEYKpdYXB9Vf6fVltk0bvvCi/exec';
const MONTHLY_DUES = 1100;
const INITIAL_DEPOSIT = 5000;

// ── FIX 2: loanRepayments added to APP ───────────────────
let APP = {members:[],dues:[],loans:[],expenses:[],notifications:[],loanRequests:[],meetings:[],loanRepayments:[]};
let CHARTS = {};

if(localStorage.getItem('hs_role') !== 'admin'){
  window.location.href = 'index.html';
}

// ── HELPERS ──────────────────────────────────────────────
const fmt = n => 'Rs ' + Number(n||0).toLocaleString();
const ini = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const getMember = id => APP.members.find(m => String(m.id)===String(id) || String(m.memberid)===String(id));
const today = () => todayBS();
// ── FIX 3: removed duplicate const fmtDate one-liner (was here) ──
function showLoader(msg='Loading...'){document.getElementById('loader-msg').textContent=msg;document.getElementById('loader').classList.add('open');}
function hideLoader(){document.getElementById('loader').classList.remove('open');}
function destroyChart(id){if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}}

const memberSort = arr => [...arr].sort((a,b)=>{
  const na=parseInt((a.memberid||'').replace(/\D/g,''))||0;
  const nb=parseInt((b.memberid||'').replace(/\D/g,''))||0;
  return na-nb;
});

async function hashPassword(pw){
  const enc=new TextEncoder().encode(pw);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function calcLoan(amount,rate,months){
  const principal=Number(amount);
  const interest=Math.round(principal*(Number(rate)/100)*(Number(months)/12));
  const totalPayable=principal+interest;
  const monthlyInstallment=Math.round(totalPayable/Number(months));
  return{principal,interest,totalPayable,monthlyInstallment};
}

function updateApWords(inputId,outputId){
  const val=Number(document.getElementById(inputId)?.value||0);
  const output=document.getElementById(outputId);
  if(output)output.textContent=numberToNepaliWords(val);
}

function numberToNepaliWords(n){
  if(!n||isNaN(n)||n<=0)return'—';
  n=Math.round(n);
  const ones=['','एक','दुई','तीन','चार','पाँच','छ','सात','आठ','नौ','दश','एघार','बाह्र','तेह्र','चौध','पन्ध्र','सोह्र','सत्र','अठार','उन्नाइस','बीस','एक्काइस','बाईस','तेईस','चौबीस','पच्चीस','छब्बीस','सत्ताईस','अठ्ठाईस','उनन्तीस','तीस','एकत्तीस','बत्तीस','तेत्तीस','चौंतीस','पैंतीस','छत्तीस','सैंतीस','अठ्तीस','उनन्चालीस','चालीस','एकचालीस','बयालीस','त्रिचालीस','चौवालीस','पैंतालीस','छयालीस','सत्चालीस','अठचालीस','उनन्चास','पचास','एकाउन्न','बाउन्न','त्रिपन्न','चउन्न','पचपन्न','छपन्न','सन्ताउन्न','अन्ठाउन्न','उनन्साठी','साठी','एकसठ्ठी','बैसठ्ठी','त्रिसठ्ठी','चौंसठ्ठी','पैंसठ्ठी','छयसठ्ठी','सत्सठ्ठी','अठसठ्ठी','उनन्त्तर','सत्तरी','एकहत्तर','बहत्तर','तिहत्तर','चौहत्तर','पचहत्तर','छहत्तर','सतहत्तर','अठहत्तर','उन्नासी','असी','एकासी','बयासी','त्रियासी','चौरासी','पचासी','छयासी','सन्तासी','अठासी','उननब्बे','नब्बे','एकानब्बे','ब्यानब्बे','त्रियानब्बे','चौरानब्बे','पन्चानब्बे','छ्यानब्बे','सन्तानब्बे','अन्ठानब्बे','उनन्सय','सय'];
  if(n<=100)return ones[n];
  if(n<1000){const h=Math.floor(n/100);const r=n%100;return ones[h]+' सय'+(r===0?'':' '+ones[r]);}
  if(n<100000){const t=Math.floor(n/1000);const r=n%1000;return numberToNepaliWords(t)+' हजार'+(r===0?'':' '+numberToNepaliWords(r));}
  if(n<10000000){const l=Math.floor(n/100000);const r=n%100000;return numberToNepaliWords(l)+' लाख'+(r===0?'':' '+numberToNepaliWords(r));}
  return numberToNepaliWords(Math.floor(n/10000000))+' करोड'+(n%10000000===0?'':' '+numberToNepaliWords(n%10000000));
}

// ── BS DATE HELPERS ───────────────────────────────────────
// todayBS() delegates to adToBs() so both use the same accurate lookup table.
// The old standalone approximation produced wrong days (e.g. 2082-12-35).
function todayBS(){
  const ad=new Date();
  const y=ad.getFullYear();
  const m=String(ad.getMonth()+1).padStart(2,'0');
  const d=String(ad.getDate()).padStart(2,'0');
  const result=adToBs(`${y}-${m}-${d}`);
  // fallback if adToBs can't convert (year outside lookup range)
  if(!result||result==='—')return`${y+56}-${m}-${d}`;
  return result;
}

function adToBs(dateStr){
  if(!dateStr)return'—';
  const str=String(dateStr).split('T')[0].trim();
  if(!str||str==='—'||str==='undefined')return'—';
  const parts=str.split('-');
  if(parts.length!==3)return str;
  const year=parseInt(parts[0]);
  const mon=parseInt(parts[1]);
  const day=parseInt(parts[2]);
  if(year>2050){
    if(mon<1||mon>12||day<1||day>32)return'—';
    return str;
  }
  const adDate=new Date(year,mon-1,day);
  if(isNaN(adDate.getTime()))return'—';
  const bsData={
    2019:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2020:[[4,13],[5,15],[6,14],[7,16],[8,17],[9,17],[10,17],[11,16],[12,15],[1,15],[2,13],[3,13]],
    2021:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2022:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2023:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2024:[[4,13],[5,14],[6,14],[7,16],[8,16],[9,16],[10,17],[11,16],[12,15],[1,14],[2,13],[3,13]],
    2025:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,17],[11,16],[12,16],[1,14],[2,12],[3,14]],
    2026:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,17],[11,16],[12,16],[1,14],[2,12],[3,14]],
  };
  for(const checkAdYear of[year,year-1]){
    const entry=bsData[checkAdYear];
    if(!entry)continue;
    const bsYear=checkAdYear+57;
    for(let bsMonth=12;bsMonth>=1;bsMonth--){
      const[startAdMon,startAdDay]=entry[bsMonth-1];
      let startYear=checkAdYear;
      if(bsMonth>=10)startYear=checkAdYear+1;
      const startDate=new Date(startYear,startAdMon-1,startAdDay);
      if(adDate>=startDate){
        const bsDay=Math.floor((adDate-startDate)/86400000)+1;
        return`${bsYear}-${String(bsMonth).padStart(2,'0')}-${String(bsDay).padStart(2,'0')}`;
      }
    }
  }
  return`${year+56}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function fmtDate(d){
  if(!d)return'—';
  const str=String(d).split('T')[0].trim();
  if(!str||str==='undefined'||str==='null')return'—';
  return adToBs(str);
}

function formatBSInput(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);
  if(v.length>7)v=v.slice(0,7)+'-'+v.slice(7);
  if(v.length>10)v=v.slice(0,10);
  el.value=v;
  const parts=v.split('-');
  const warn=el.nextElementSibling;
  if(parts.length===3&&v.length===10){
    const y=parseInt(parts[0]),m=parseInt(parts[1]),d=parseInt(parts[2]);
    if(y<2079||y>2100||m<1||m>12||d<1||d>32){el.style.borderColor='var(--secondary)';if(warn)warn.style.color='var(--secondary)';}
    else{el.style.borderColor='var(--success)';if(warn)warn.style.color='var(--muted)';}
  }else{el.style.borderColor='var(--border)';if(warn)warn.style.color='var(--muted)';}
}

async function uploadFileToGDrive(file,label){
  return new Promise((resolve)=>{
    if(!file){resolve(null);return;}
    if(file.type.startsWith('image/')){
      const img=new Image();const reader=new FileReader();
      reader.onload=(e)=>{
        img.onload=async()=>{
          const canvas=document.createElement('canvas');
          const MAX=800;let w=img.width,h=img.height;
          if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          const base64=canvas.toDataURL('image/jpeg',0.7).split(',')[1];
          try{const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'uploadFile',fileName:label+'.jpg',base64Data:base64,mimeType:'image/jpeg'})});const data=await res.json();resolve(data.url||null);}
          catch(e){resolve(null);}
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    }else{
      if(file.size>2*1024*1024){alert('File too large. Max 2MB.');resolve(null);return;}
      const reader=new FileReader();
      reader.onload=async(e)=>{
        const base64=e.target.result.split(',')[1];
        try{const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'uploadFile',fileName:label+'_'+file.name,base64Data:base64,mimeType:file.type})});const data=await res.json();resolve(data.url||null);}
        catch(e){resolve(null);}
      };
      reader.readAsDataURL(file);
    }
  });
}

    if(ms)CHARTS['c-member-status']=new Chart(ms,{type:'doughnut',data:{labels:[`Paid (${paidCount})`,`Unpaid (${unpaidCount})`],datasets:[{data:[paidCount,unpaidCount],backgroundColor:['#22c55e','#ef4444'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:12},boxWidth:12,padding:16}}},cutout:'60%'}});

    // ── Chart 5: Collection by Payment Mode ──
    const payModes={};
    APP.dues.filter(d=>d.status==='paid').forEach(d=>{const m=d.paymode||'Cash';payModes[m]=(payModes[m]||0)+Number(d.amount);});
    const pmLabels=Object.keys(payModes);
    const pmColors=['#003366','#3b82f6','#22c55e','#fbbf24','#8b5cf6','#f59e0b'];
    const pm=document.getElementById('c-paymode');
    if(pm&&pmLabels.length)CHARTS['c-paymode']=new Chart(pm,{type:'pie',data:{labels:pmLabels,datasets:[{data:pmLabels.map(k=>payModes[k]),backgroundColor:pmColors.slice(0,pmLabels.length),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}}}});
    else if(pm)pm.parentElement.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px;font-size:13px">No payment data yet.</p>';

    // ── Chart 6: Special Contributions by Occasion ──
    const occasions={};
    APP.dues.filter(d=>d.status==='paid'&&d.type==='special').forEach(d=>{
      const occ=d.note||String(d.month||'').split(' ')[0]||'Other';
      occasions[occ]=(occasions[occ]||0)+Number(d.amount);
    });
    const occLabels=Object.keys(occasions).slice(0,8);
    const occColors=['#fbbf24','#f59e0b','#ef4444','#8b5cf6','#3b82f6','#22c55e','#ec4899','#6b7280'];
    const sc=document.getElementById('c-special');
    if(sc&&occLabels.length)CHARTS['c-special']=new Chart(sc,{type:'bar',data:{labels:occLabels,datasets:[{label:'Amount',data:occLabels.map(k=>occasions[k]),backgroundColor:occColors.slice(0,occLabels.length),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rs '+v.toLocaleString()}},x:{grid:{display:false},ticks:{maxRotation:30}}}}});
    else if(sc)sc.parentElement.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px;font-size:13px">No special contributions yet.</p>';

    // ── Chart 7: Expenses by Category ──
    const expCats={};
    (APP.expenses||[]).forEach(e=>{const c=e.category||'Other';expCats[c]=(expCats[c]||0)+Number(e.amount);});
    const expLabels=Object.keys(expCats);
    const expColors=['#ef4444','#f59e0b','#8b5cf6','#3b82f6','#22c55e','#ec4899','#6b7280'];
    const ec=document.getElementById('c-expenses');
    if(ec&&expLabels.length)CHARTS['c-expenses']=new Chart(ec,{type:'doughnut',data:{labels:expLabels,datasets:[{data:expLabels.map(k=>expCats[k]),backgroundColor:expColors.slice(0,expLabels.length),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}},cutout:'55%'}});
    else if(ec)ec.parentElement.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px;font-size:13px">No expenses recorded yet.</p>';

    // ── Chart 8: Yearly Dues Trend by BS month ──
    const years=[...new Set(APP.dues.map(d=>String(d.year||d.date?.split('-')[0]||'')).filter(Boolean))].sort();
    const yearColors={'2081':'#003366','2082':'#3b82f6','2083':'#fbbf24','2084':'#22c55e','2085':'#ef4444'};
    const trendDatasets=years.map(yr=>({
      label:yr+' BS',
      data:BS_MONTHS.map(mon=>{
        return APP.dues.filter(d=>d.status==='paid'&&d.type==='monthly'&&String(d.year||d.date?.split('-')[0])===yr&&String(d.month||'').startsWith(mon)).reduce((s,d)=>s+Number(d.amount),0)||null;
      }),
      borderColor:yearColors[yr]||'#6b7280',
      backgroundColor:(yearColors[yr]||'#6b7280')+'22',
      tension:0.4,pointRadius:4,fill:false,
      borderDash:yr==='2081'?[4,4]:[],
    }));
    const tc=document.getElementById('c-trend');
    if(tc&&trendDatasets.length)CHARTS['c-trend']=new Chart(tc,{type:'line',data:{labels:BS_MONTHS,datasets:trendDatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:12,usePointStyle:true}}},scales:{y:{ticks:{callback:v=>'Rs '+v.toLocaleString()},beginAtZero:true},x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:30}}},spanGaps:false}});
    else if(tc)tc.parentElement.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px;font-size:13px">No trend data yet.</p>';
    const netPool=Math.max(0,totalDues+Math.round(interest)-totalExpenses);
    const equalShare=verifiedMembers.length>0?Math.round(netPool/verifiedMembers.length):0;
    const avgContrib=verifiedMembers.length>0?Math.round(totalDues/verifiedMembers.length):1;
    const SHARE_PG=6;
    const shareData=memberSort(verifiedMembers).map(m=>{
      const mId=String(m.memberid||m.id);
      const contributed=APP.dues.filter(d=>(String(d.memberId)===mId||String(d.memberId)===String(m.id))&&d.status==='paid'&&d.type!=='loan_repayment').reduce((s,d)=>s+Number(d.amount),0);
      const myLoans=APP.loans.filter(l=>String(l.memberId)===mId||String(l.memberId)===String(m.id));
      const loanOut=myLoans.reduce((s,l)=>s+Math.max(0,(Number(l.totalPayable)||calcLoan(l.amount,l.rate,l.months).totalPayable)-Number(l.repaid)),0);
      const netReceivable=equalShare-loanOut;
      const pct=avgContrib>0?Math.min(100,Math.round((contributed/avgContrib)*100)):0;
      return{m,contributed,loanOut,netReceivable,pct};
    });

    function renderShareRow({m,contributed,loanOut,netReceivable,pct}){
      return`<tr>
        <td style="padding:10px;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="av" style="width:28px;height:28px;font-size:10px;flex-shrink:0;overflow:hidden;padding:0">
              ${m.photourl?`<img src="${m.photourl.replace('uc?export=view','thumbnail?sz=w60')}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none';this.parentElement.textContent='${ini(m.fullname)}'">`:`${ini(m.fullname)}`}
            </div>
            <div>
              <div style="font-weight:600;font-size:12px">${m.fullname}</div>
              <div style="font-size:10px;color:var(--muted)">${m.memberid||'—'}</div>
            </div>
          </div>
        </td>
        <td style="padding:10px;border-bottom:1px solid var(--border);text-align:right">
          <div style="font-weight:600">${fmt(contributed)}</div>
          <div style="background:var(--border);border-radius:10px;height:4px;width:70px;overflow:hidden;margin:4px 0 0 auto">
            <div style="background:var(--primary);height:100%;width:${pct}%;border-radius:10px"></div>
          </div>
        </td>
        <td style="padding:10px;border-bottom:1px solid var(--border);text-align:right;font-weight:600;color:${loanOut>0?'var(--secondary)':'var(--muted)'}">
          ${loanOut>0?fmt(loanOut):'—'}
        </td>
        <td style="padding:10px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:var(--primary)">
          ${fmt(equalShare)}
        </td>
        <td style="padding:10px;border-bottom:1px solid var(--border);text-align:right">
          <span style="font-weight:700;font-size:13px;color:${netReceivable>=0?'var(--success)':'var(--secondary)'}">
            ${fmt(netReceivable)}
          </span>
        </td>
        <td style="padding:10px;border-bottom:1px solid var(--border)">
          ${loanOut>0?`<span class="badge br">Loan Active</span>`:`<span class="badge bv">Clear</span>`}
        </td>
      </tr>`;
    }

    function renderSharePage(page){
      const totalPages=Math.max(1,Math.ceil(shareData.length/SHARE_PG));
      page=Math.max(1,Math.min(page,totalPages));
      const start=(page-1)*SHARE_PG;
      const pageData=shareData.slice(start,start+SHARE_PG);
      const body=document.getElementById('share-table-body');
      if(body) body.innerHTML=pageData.map(renderShareRow).join('');
      const pgDiv=document.getElementById('share-pagination');
      if(!pgDiv)return;
      const pages=Array.from({length:totalPages},(_,i)=>i+1);
      pgDiv.innerHTML=`
        <div style="font-size:12px;color:var(--muted)">Showing <strong>${start+1}–${Math.min(start+SHARE_PG,shareData.length)}</strong> of <strong>${shareData.length}</strong> members</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <button onclick="window.__sharePageGo(${page-1})" ${page===1?'disabled':''} style="padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:${page===1?'#f3f4f6':'white'};color:${page===1?'var(--muted)':'var(--primary)'};cursor:${page===1?'not-allowed':'pointer'};font-size:12px;font-weight:600">‹ Prev</button>
          ${pages.map(p=>`<button onclick="window.__sharePageGo(${p})" style="padding:5px 11px;border:1px solid ${p===page?'var(--primary)':'var(--border)'};border-radius:6px;background:${p===page?'var(--primary)':'white'};color:${p===page?'white':'var(--text)'};cursor:pointer;font-size:12px;font-weight:${p===page?'700':'400'}">${p}</button>`).join('')}
          <button onclick="window.__sharePageGo(${page+1})" ${page===totalPages?'disabled':''} style="padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:${page===totalPages?'#f3f4f6':'white'};color:${page===totalPages?'var(--muted)':'var(--primary)'};cursor:${page===totalPages?'not-allowed':'pointer'};font-size:12px;font-weight:600">Next ›</button>
        </div>`;
    }
    window.__sharePageGo=renderSharePage;
    renderSharePage(1);
  },120);
}

async function verifyMember(id){
  const m=getMember(id);if(!m)return;
  const mPhone=String(m.phone||'').trim();
  const mCitizen=String(m.citizenno||'').trim();
  const duplicates=APP.members.filter(x=>String(x.id)!==String(id)&&x.status!=='rejected'&&((mPhone!==''&&String(x.phone||'').trim()===mPhone)||(mCitizen!==''&&String(x.citizenno||'').trim()===mCitizen)));
  if(duplicates.length>0){
    const dupNames=duplicates.map(x=>`${x.fullname} (@${x.username})`).join(', ');
    if(!confirm(`⚠️ DUPLICATE ACCOUNT DETECTED!\n\n"${m.fullname}" matches: ${dupNames}\n\nThis account will be REJECTED.`))return;
    showLoader('Rejecting duplicate...');
    APP.members=APP.members.filter(x=>String(x.id)!==String(id));
    const rej={...m,status:'rejected',rejectReason:`Duplicate — matches: ${dupNames}`,rejectedOn:todayBS()};
    APP.members.push(rej);
    await updateSheet('Members',id,{status:'rejected',rejectReason:rej.rejectReason,rejectedOn:todayBS()});
    hideLoader();updateBadges();renderAdminVerify(document.getElementById('admin-main'));return;
  }
  const inputEl=document.getElementById('mid-'+id);
  const memberId=inputEl?inputEl.value.trim():null;
  if(!memberId){alert('Please enter a Member ID before verifying.');if(inputEl)inputEl.focus();return;}
  const dupId=APP.members.find(x=>String(x.memberid)===String(memberId)&&String(x.id)!==String(id));
  if(dupId){alert(`Member ID "${memberId}" is already assigned to ${dupId.fullname}.`);return;}
  if(!confirm(`Verify ${m.fullname} with Member ID: ${memberId}?`))return;
  showLoader('Verifying member...');
  m.status='verified';m.memberid=memberId;
  await updateSheet('Members',id,{status:'verified',memberid:memberId});
  if(m.email){await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'sendWelcomeEmail',to:m.email,name:m.fullname,username:m.username,memberId:memberId,website:'https://hatemalosamuha.vercel.app'})});}
  addNotification('Account Verified',`${m.fullname} verified — Member ID: ${memberId}`,'success','✅',memberId);
  hideLoader();updateBadges();renderAdminVerify(document.getElementById('admin-main'));
  alert(`✅ ${m.fullname} verified!\nMember ID: ${memberId}`);
}

function populateLoanSelector(){
  const memId=document.getElementById('f-memid')?.value;
  const member=getMember(memId);
  const sel=document.getElementById('f-loan-id');
  if(!sel)return;
  const activeLoans=APP.loans.filter(l=>(String(l.memberId)===String(member?.memberid)||String(l.memberId)===String(memId))&&l.status==='active');
  if(activeLoans.length===0){sel.innerHTML='<option value="">No active loans for this member</option>';return;}
  sel.innerHTML=activeLoans.map(l=>{
    const calc=calcLoan(l.amount,l.rate,l.months);
    const total=Number(l.totalPayable)||calc.totalPayable;
    const remaining=total-Number(l.repaid);
    const monthly=Number(l.monthlyInstallment)||calc.monthlyInstallment;
    return`<option value="${l.id}">Loan ${l.id} — Principal: ${fmt(l.amount)} | Remaining: ${fmt(remaining)} | Monthly: ${fmt(monthly)}</option>`;
  }).join('');
  const first=activeLoans[0];
  const calc=calcLoan(first.amount,first.rate,first.months);
  document.getElementById('f-amount').value=Number(first.monthlyInstallment)||calc.monthlyInstallment;
}

async function recordPayment(){
  showLoader('Saving...');
  const memId=document.getElementById('f-memid').value;
  const member=getMember(memId);
  const dateVal=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const amount=Number(document.getElementById('f-amount').value);
  if(!amount||amount<=0){hideLoader();alert('Please enter a valid amount.');return;}
  const typeLabels={initial:'Initial Deposit',loan_repayment:'Loan Repayment',loan_fee:'Loan Application Fee',special:'Special',other:'Other'};
  const note=document.getElementById('f-note').value.trim();

  const year=type==='special'
    ? (dateVal?dateVal.split('-')[0]:todayBS().split('-')[0])
    : document.getElementById('f-year').value;
  const specialLabel=type==='special'?(document.getElementById('f-occasion')?.value||'Special'):null;
  const month=type==='monthly'
    ? document.getElementById('f-month').value
    : type==='special'
      ? specialLabel
      : document.getElementById('f-month').value;

      let selectedLoanId='';
  if(type==='loan_repayment'){
    selectedLoanId=document.getElementById('f-loan-id')?.value||'';
    const fallbackLoan=APP.loans.find(l=>(String(l.memberId)===String(member?.memberid)||String(l.memberId)===String(memId))&&l.status==='active');
    const activeLoan=selectedLoanId?APP.loans.find(l=>String(l.id)===String(selectedLoanId)):fallbackLoan;
    if(activeLoan)selectedLoanId=String(activeLoan.id);
  }
  // Build note: for special use occasion as note (matches dedicated special form)
  const dueNote = type==='special'
    ? (specialLabel + (note ? ' — '+note : ''))
    : note;

// REPLACE WITH:
  if(type==='monthly'||type==='initial'){
    const dup=checkDuplicateDue(member?.memberid||memId, type, month, year);
    if(dup){
      hideLoader();
      const proceed=await adminAlert(
        '⚠️',
        'Duplicate Detected',
        `<strong>${member?.fullname||'This member'}</strong> already has a `+
        `<strong>${type==='monthly'?'monthly dues':'initial deposit'}</strong> record for `+
        `<strong>${month} ${year}</strong>.<br><br>`+
        `<div style="background:#fef3c7;border-radius:8px;padding:12px;text-align:left;font-size:12px;margin-bottom:6px">`+
        `Amount: <strong>${fmt(dup.amount)}</strong><br>`+
        `Date: <strong>${fmtDate(dup.date)}</strong><br>`+
        `Mode: <strong>${dup.paymode||'—'}</strong></div>`+
        `Do you still want to add another record?`,
        [{label:'Cancel',value:false,primary:false},{label:'Add Anyway',value:true,primary:true}]
      );
      if(!proceed)return;
      showLoader('Saving...');
    }
  }

  const newDue = {
    id:         Date.now()+Math.floor(Math.random()*1000),
    memberId:   member?.memberid||memId,
    memberName: member?.fullname||'',
    year,
    month,
    amount,
    date:       dateVal,
    status:     'paid',
    paymode:    document.getElementById('pay-mode')?.value||'Cash',
    type,
    note:       dueNote||(type==='initial'?'Initial Deposit':type==='loan_repayment'?'Loan Repayment':type==='loan-fee'?'Loan Application Fee':'')
  };
  // Only add loanId for loan repayments (not in sheet for other types)
  if(type==='loan_repayment'&&selectedLoanId) newDue.loanId=selectedLoanId;
  APP.dues.push(newDue);await saveToSheet('Dues',newDue);
  if(type==='loan_repayment'&&selectedLoanId){
    const activeLoan=APP.loans.find(l=>String(l.id)===String(selectedLoanId));
    if(activeLoan){
      const installmentNo=APP.dues.filter(d=>String(d.loanId)===String(activeLoan.id)&&d.type==='loan_repayment').length;
      const lrCalc=calcLoan(activeLoan.amount,activeLoan.rate,activeLoan.months);
      const lrTotalPay=Number(activeLoan.totalPayable)||lrCalc.totalPayable;
      const lrInterestT=Number(activeLoan.interest)||lrCalc.interest;
      const lrIntPortion=Math.round(lrInterestT*(amount/lrTotalPay));
      const lrRecord={id:Date.now()+Math.floor(Math.random()*999),loanId:activeLoan.id,memberId:member?.memberid||memId,memberName:member?.fullname||'',installmentNo,amount,interest:lrIntPortion,principal:amount-lrIntPortion,date:dateVal,status:'paid',note:document.getElementById('f-note')?.value||''};
      await saveToSheet('LoanRepayments',lrRecord);
    }
  }
  await loadAllData('Refreshing data...');
  updateBadges();
  hideLoader();
  const successEl=document.getElementById('pay-success');
  if(successEl){successEl.classList.remove('hidden');setTimeout(()=>successEl?.classList.add('hidden'),3000);}
}

async function bulkMarkPaid(){
  const month=document.getElementById('bulk-month').value;
  const year=document.getElementById('bulk-year').value;
  const amount=Number(document.getElementById('bulk-amount').value);
  const date=document.getElementById('bulk-date').value;
  const selected=[...document.querySelectorAll('.bulk-cb:checked')];
  if(selected.length===0){
    await adminAlert('⚠️','No Members Selected','Please select at least one member to mark as paid.',[{label:'OK',value:true,primary:true}]);
    return;
  }

  // pre-check duplicates before saving
  const alreadyPaid=[];const toSave=[];
  for(const cb of selected){
    const memId=cb.getAttribute('data-mid');const member=getMember(memId);
    const dup=checkDuplicateDue(member?.memberid||memId,'monthly',month,year);
    if(dup)alreadyPaid.push(member?.fullname||memId);
    else toSave.push({memId,member});
  }

  // if some already paid, warn before proceeding
  if(alreadyPaid.length>0&&toSave.length>0){
    const proceed=await adminAlert(
      '⚠️',
      'Some Already Paid',
      `<strong>${alreadyPaid.length}</strong> member(s) already have dues recorded for <strong>${month} ${year}</strong>:<br><br>`+
      `<div style="background:#fef3c7;border-radius:8px;padding:10px;margin-bottom:8px;text-align:left;font-size:12px">${alreadyPaid.join('<br>')}</div>`+
      `<strong>${toSave.length}</strong> member(s) will be recorded. Continue?`,
      [{label:'Cancel',value:false,primary:false},{label:'Proceed for '+toSave.length,value:true,primary:true}]
    );
    if(!proceed)return;
  } else if(alreadyPaid.length>0&&toSave.length===0){
    await adminAlert(
      '✅',
      'All Already Paid',
      `All selected members already have dues recorded for <strong>${month} ${year}</strong>:<br><br>`+
      `<div style="background:#dcfce7;border-radius:8px;padding:10px;text-align:left;font-size:12px">${alreadyPaid.join('<br>')}</div>`,
      [{label:'OK',value:true,primary:true}]
    );
    return;
  }

  showLoader('Saving bulk payments...');
  const saved=[];
  for(const{memId,member}of toSave){
    const d={id:Date.now()+Math.floor(Math.random()*9999),memberId:member?.memberid||memId,memberName:member?.fullname||'',year,month,amount,date,status:'paid',paymode:document.getElementById('bulk-pay-mode')?.value||'Cash',type:'monthly',note:'Bulk entry'};
    APP.dues.push(d);await saveToSheet('Dues',d);saved.push(member?.fullname||memId);
  }
  await loadAllData('Refreshing data...');
  updateBadges();
  hideLoader();

  // success modal
  await adminAlert(
    '✅',
    'Bulk Payment Recorded',
    `<strong>${saved.length}</strong> payment(s) successfully recorded for <strong>${month} ${year}</strong>.<br><br>`+
    (saved.length>0?`<div style="background:#dcfce7;border-radius:8px;padding:10px;text-align:left;font-size:12px;margin-bottom:${alreadyPaid.length>0?'10':'0'}px">${saved.join('<br>')}</div>`:'')  +
    (alreadyPaid.length>0?`<div style="font-size:12px;color:var(--muted);margin-top:4px">Skipped <strong>${alreadyPaid.length}</strong> already paid: <span style="color:var(--warning)">${alreadyPaid.join(', ')}</span></div>`:''),
    [{label:'OK',value:true,primary:true}]
  );
}

function syncLoanRepaid(){
  APP.loans.forEach(l=>{
    const lrSheet=APP.loanRepayments||[];
    let payments=lrSheet.filter(r=>String(r.loanId)===String(l.id));
    if(payments.length===0)payments=APP.dues.filter(d=>String(d.loanId)===String(l.id)&&d.type==='loan_repayment');
    if(payments.length===0){const mem=getMember(l.memberId);const memKey=mem?.memberid||l.memberId;payments=APP.dues.filter(d=>(String(d.memberId)===String(memKey)||String(d.memberId)===String(mem?.id))&&d.type==='loan_repayment');}
    if(payments.length===0)return;
    const actualRepaid=payments.reduce((s,r)=>s+Number(r.amount),0);
    if(Number(l.repaid)===actualRepaid)return;
    l.repaid=actualRepaid;
    const calc=calcLoan(l.amount,l.rate,l.months);
    const totalPayable=Number(l.totalPayable)||calc.totalPayable;
    l.status=actualRepaid>=totalPayable?'settled':'active';
    updateSheet('Loans',l.id,{repaid:actualRepaid,status:l.status});
  });
}

async function recordRepayment(loanId){
  const l=APP.loans.find(x=>String(x.id)===String(loanId));if(!l)return;
  const totalPayable=Number(l.totalPayable)||calcLoan(l.amount,l.rate,l.months).totalPayable;
  const alreadyRepaid=Number(l.repaid)||0;
  const remaining=totalPayable-alreadyRepaid;
  const amt=parseFloat(prompt(`Enter repayment amount\nTotal Payable: ${fmt(totalPayable)}\nAlready Paid: ${fmt(alreadyRepaid)}\nRemaining: ${fmt(remaining)}`));
  if(isNaN(amt)||amt<=0)return;
  showLoader('Recording repayment...');
  const newRepaid=Math.min(alreadyRepaid+amt,totalPayable);
  l.repaid=newRepaid;l.status=newRepaid>=totalPayable?'settled':'active';
  await updateSheet('Loans',loanId,{repaid:newRepaid,status:l.status});
  const mem2=getMember(l.memberId);
  const installCount=APP.dues.filter(d=>String(d.loanId)===String(loanId)&&d.type==='loan_repayment').length+1;
  const repayDue={id:Date.now()+Math.floor(Math.random()*1000),memberId:mem2?.memberid||l.memberId,memberName:mem2?.fullname||'',year:todayBS().split('-')[0],month:'Loan Repayment '+todayBS().slice(0,7),amount:amt,date:todayBS(),status:'paid',type:'loan_repayment',note:'Loan ID: '+loanId,paymode:'Cash',loanId};
  APP.dues.push(repayDue);await saveToSheet('Dues',repayDue);
  const lrCalc=calcLoan(l.amount,l.rate,l.months);
  const lrTotalPay=Number(l.totalPayable)||lrCalc.totalPayable;
  const lrInterestT=Number(l.interest)||lrCalc.interest;
  const lrIntPortion=Math.round(lrInterestT*(amt/lrTotalPay));
  const lrRecord={id:Date.now()+Math.floor(Math.random()*999),loanId,memberId:mem2?.memberid||l.memberId,memberName:mem2?.fullname||'',installmentNo:installCount,amount:amt,interest:lrIntPortion,principal:amt-lrIntPortion,date:todayBS(),status:'paid',note:'Recorded via admin panel — Loan ID: '+loanId};
  await saveToSheet('LoanRepayments',lrRecord);
  addNotification('Loan Repayment Recorded',`${fmt(amt)} repaid for ${mem2?.fullname||l.memberId}. Remaining: ${fmt(remaining-amt)}`,'loan','💰',mem2?.memberid||l.memberId);
  hideLoader();renderAdminLoans(document.getElementById('admin-main'));
}

async function rejectLoanRequest(id){
  const req=APP.loanRequests.find(l=>String(l.id)===String(id));if(!req)return;
  const reason=prompt('Reason for rejection (optional):','Not approved at this time');
  if(reason===null)return;
  showLoader('Rejecting loan request...');
  req.status='rejected';
  await updateSheet('LoanRequests',id,{status:'rejected',rejectReason:reason||''});
  addNotification('Loan Rejected',`Loan request of ${fmt(req.amount)} was not approved. Reason: ${reason}`,'warning','📋',req.memberId);
  const rejMember=getMember(req.memberId);const rejEmail=rejMember?.email||'';
  if(rejEmail){try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'sendLoanRejectionEmail',to:rejEmail,memberName:rejMember?.fullname||req.memberName||'',memberId:rejMember?.memberid||req.memberId||'',loanType:req.loanType||'—',amount:req.amount||0,reason:reason||'Not specified',date:todayBS()})});}catch(e){}}
  hideLoader();updateBadges();renderAdminLoans(document.getElementById('admin-main'));
}

  const l=APP.loans.find(x=>String(x.id)===String(loanId));if(!l)return;
  const mem=getMember(l.memberId);
  const calc=calcLoan(l.amount,l.rate,l.months);
  const totalPayable=Number(l.totalPayable)||calc.totalPayable;
  const monthly=Number(l.monthlyInstallment)||calc.monthlyInstallment;
  const interest=Number(l.interest)||calc.interest;
  document.getElementById('pm-header').innerHTML=`<h3>Edit Loan — ${mem?.fullname||l.memberId}</h3><button onclick="document.getElementById('profile-modal-bg').classList.remove('open')" style="background:none;border:none;color:white;font-size:22px;cursor:pointer">&times;</button>`;
  document.getElementById('pm-body').innerHTML=`
    <div class="alert alert-w" style="margin-bottom:16px">⚠️ Editing loan details will recalculate interest, total payable and monthly installment.</div>
    <div style="display:flex;align-items:center;gap:14px;padding:12px;background:#f8faff;border-radius:10px;border:1px solid #e0e7ff;margin-bottom:18px">
      <div class="av" style="width:44px;height:44px;font-size:14px;flex-shrink:0">${ini(mem?.fullname||'?')}</div>
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--primary)">${mem?.fullname||l.memberId}</div>
        <div style="font-size:12px;color:var(--muted)">Loan ID: ${l.id} &nbsp;·&nbsp; Member ID: ${mem?.memberid||l.memberId}</div>
      </div>
    </div>
    <div style="background:#f8faff;border:1px solid #e0e7ff;border-radius:10px;padding:14px;margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px">Current Loan Details</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div class="sc2"><div class="sc2-label">Principal</div><div class="sc2-val" style="font-size:15px">${fmt(l.amount)}</div></div>
        <div class="sc2"><div class="sc2-label">Interest</div><div class="sc2-val" style="font-size:15px;color:var(--warning)">${fmt(interest)}</div></div>
        <div class="sc2"><div class="sc2-label">Total Payable</div><div class="sc2-val" style="font-size:15px">${fmt(totalPayable)}</div></div>
        <div class="sc2"><div class="sc2-label">Monthly</div><div class="sc2-val" style="font-size:15px;color:var(--primary)">${fmt(monthly)}</div></div>

    <div class="fsect">Edit Loan Details</div>
    <div class="fgrid2">
      <div class="frow"><label>Principal Amount (Rs) <span style="color:var(--secondary)">*</span></label>
        <input type="number" id="el-amount" value="${l.amount}" oninput="previewLoanCalc()">
      </div>
      <div class="frow"><label>Interest Rate (% per annum) <span style="color:var(--secondary)">*</span></label>
        <input type="number" id="el-rate" value="${l.rate}" step="0.5" oninput="previewLoanCalc()">
      </div>
      <div class="frow"><label>Duration (months) <span style="color:var(--secondary)">*</span></label>
        <input type="number" id="el-months" value="${l.months}" oninput="previewLoanCalc()">
      </div>
      <div class="frow"><label>Amount Already Repaid (Rs)</label>
        <input type="number" id="el-repaid" value="${l.repaid||0}">
      </div>
      <div class="frow"><label>Issued Date (BS) <span style="color:var(--secondary)">*</span></label>
        <input type="text" id="el-issued" value="${l.issued||''}" maxlength="10" oninput="formatBSInput(this)" placeholder="YYYY-MM-DD">
      </div>
      <div class="frow"><label>Status</label>
        <select id="el-status">
          <option value="active" ${l.status==='active'?'selected':''}>Active</option>

        <div><div style="font-size:10px;color:var(--muted);font-weight:700">TOTAL PAYABLE</div><div style="font-size:14px;font-weight:700;color:var(--primary)" id="el-pre-total">—</div></div>

        <div><div style="font-size:10px;color:var(--muted);font-weight:700">REMAINING</div><div style="font-size:14px;font-weight:700;color:var(--secondary)" id="el-pre-remaining">—</div></div>

    </div>`;
  document.getElementById('profile-modal-bg').classList.add('open');
  previewLoanCalc();
}

function previewLoanCalc(){
  const amount=Number(document.getElementById('el-amount')?.value||0);
  const rate=Number(document.getElementById('el-rate')?.value||0);
  const months=Number(document.getElementById('el-months')?.value||0);
  const repaid=Number(document.getElementById('el-repaid')?.value||0);
  const preview=document.getElementById('el-preview');
  if(!amount||!rate||!months){if(preview)preview.style.display='none';return;}
  const calc=calcLoan(amount,rate,months);
  if(preview)preview.style.display='block';
  const remaining=Math.max(0,calc.totalPayable-repaid);
  document.getElementById('el-pre-interest').textContent=fmt(calc.interest);
  document.getElementById('el-pre-total').textContent=fmt(calc.totalPayable);
  document.getElementById('el-pre-monthly').textContent=fmt(calc.monthlyInstallment);
  document.getElementById('el-pre-remaining').textContent=fmt(remaining);
}

async function saveLoanEdit(loanId){
  const l=APP.loans.find(x=>String(x.id)===String(loanId));
  const errEl=document.getElementById('el-err');if(!l)return;
  errEl.classList.add('hidden');
  const amount=Number(document.getElementById('el-amount').value);
  const rate=Number(document.getElementById('el-rate').value);
  const months=Number(document.getElementById('el-months').value);
  const repaid=Number(document.getElementById('el-repaid').value||0);
  const issued=document.getElementById('el-issued').value.trim();
  const status=document.getElementById('el-status').value;
  const purpose=document.getElementById('el-purpose').value.trim();
  if(!amount||amount<=0){errEl.textContent='Please enter a valid principal amount.';errEl.classList.remove('hidden');return;}
  if(!rate||rate<=0){errEl.textContent='Please enter a valid interest rate.';errEl.classList.remove('hidden');return;}
  if(!months||months<=0){errEl.textContent='Please enter a valid duration.';errEl.classList.remove('hidden');return;}
  if(!issued){errEl.textContent='Please enter the issued date.';errEl.classList.remove('hidden');return;}
  if(!confirm(`Save changes to this loan?\n\nPrincipal: ${fmt(amount)} | Rate: ${rate}% | Duration: ${months} months`))return;
  showLoader('Saving loan changes...');
  const calc=calcLoan(amount,rate,months);
  l.amount=amount;l.rate=rate;l.months=months;l.repaid=repaid;
  l.interest=calc.interest;l.totalPayable=calc.totalPayable;
  l.monthlyInstallment=calc.monthlyInstallment;
  l.issued=issued;l.status=status;l.purpose=purpose;
  await updateSheet('Loans',loanId,{
    amount,rate,months,repaid,issued,status,purpose,
    interest:calc.interest,
    totalPayable:calc.totalPayable,
    monthlyInstallment:calc.monthlyInstallment
  });
  addNotification('Loan Updated',`Loan for ${getMember(l.memberId)?.fullname||l.memberId} updated — ${fmt(amount)} at ${rate}% for ${months} months.`,'loan','✏️');
  await loadAllData('Refreshing...');
  updateBadges();
  hideLoader();
  document.getElementById('profile-modal-bg').classList.remove('open');
  renderAdminLoans(document.getElementById('admin-main'));
  alert('✅ Loan updated successfully!');
}

// ── DELETE LOAN ───────────────────────────────────────────
async function deleteLoan(loanId){
  const l=APP.loans.find(x=>String(x.id)===String(loanId));if(!l)return;
  const mem=getMember(l.memberId);
  if(!confirm(`Permanently delete this loan for ${mem?.fullname||l.memberId}?\n\nPrincipal: ${fmt(l.amount)}\n\nThis cannot be undone.`))return;
  showLoader('Deleting loan...');
  APP.loans=APP.loans.filter(x=>String(x.id)!==String(loanId));
  await deleteFromSheet('Loans',loanId);
  addNotification('Loan Deleted',`Loan of ${fmt(l.amount)} for ${mem?.fullname||l.memberId} was deleted.`,'warning','🗑️');
  await loadAllData('Refreshing...');
  updateBadges();
  hideLoader();
  renderAdminLoans(document.getElementById('admin-main'));
}

// ── REPORT ────────────────────────────────────────────────
function renderAdminReport(el){
  const totalDues=APP.dues.filter(d=>d.status==='paid').reduce((s,d)=>s+Number(d.amount),0);
  const totalLoans=APP.loans.reduce((s,l)=>s+Number(l.amount),0);
  const totalRepaid=APP.loans.reduce((s,l)=>s+Number(l.repaid),0);
  const totalExpenses=(APP.expenses||[]).reduce((s,e)=>s+Number(e.amount),0);
  const interest=APP.loans.reduce((s,l)=>s+(Number(l.interest)||calcLoan(l.amount,l.rate,l.months).interest),0);
  const thStyle=`text-align:left;padding:9px 10px;background:#f8fafc;font-weight:700;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap`;
  const tdStyle=`padding:10px;border-bottom:1px solid var(--border);white-space:nowrap`;
  // FIX 7: sorted by member ID
  const sorted=memberSort(APP.members.filter(m=>m.status==='verified'));
  el.innerHTML=`
    <div class="ph"><h2>Fund Report</h2><p>Complete financial summary — Hatemalo Samuha</p></div>
    <div class="sg4">
      <div class="sc2"><div class="sc2-label">Total Dues Collected</div><div class="sc2-val">${fmt(totalDues)}</div></div>
      <div class="sc2"><div class="sc2-label">Total Loans Issued</div><div class="sc2-val">${fmt(totalLoans)}</div></div>
      <div class="sc2"><div class="sc2-label">Total Repaid</div><div class="sc2-val" style="color:var(--success)">${fmt(totalRepaid)}</div></div>
      <div class="sc2"><div class="sc2-label">Outstanding</div><div class="sc2-val" style="color:var(--secondary)">${fmt(totalLoans-totalRepaid)}</div></div>
    </div>
    <div class="card"><div class="card-title">Fund Growth Over Time</div><div class="chart-wrap-lg"><canvas id="c-growth"></canvas></div></div>

    <div class="card">
      <div class="card-title">Member-wise Summary</div>
      <div class="tbl-wrap"><table style="width:100%;border-collapse:collapse;font-size:12px" id="report-mem-tbl">
        <thead><tr>
          <th style="${thStyle}">Member</th><th style="${thStyle}">Initial</th><th style="${thStyle}">Monthly Dues</th>
          <th style="${thStyle}">Special</th><th style="${thStyle}">Est. Interest</th><th style="${thStyle}">Total In</th>
          <th style="${thStyle}">Loan Remaining</th><th style="${thStyle}">Net</th>
        </tr></thead>
        <tbody id="report-mem-body"></tbody>
      </table></div>
      <div id="report-mem-pagination" style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;flex-wrap:wrap;gap:8px"></div>
    </div>`;

  // ── Member-wise pagination ─────────────────────────────
  const RPG=5;
  const reportMemData=sorted.map(m=>{
    const mId=String(m.memberid||m.id);
    const initial=APP.dues.filter(d=>(String(d.memberId)===String(m.memberid)||String(d.memberId)===mId)&&d.status==='paid'&&d.type==='initial').reduce((s,d)=>s+Number(d.amount),0);
    const dues=APP.dues.filter(d=>(String(d.memberId)===String(m.memberid)||String(d.memberId)===mId)&&d.status==='paid'&&d.type==='monthly').reduce((s,d)=>s+Number(d.amount),0);
    const special=APP.dues.filter(d=>(String(d.memberId)===String(m.memberid)||String(d.memberId)===mId)&&d.status==='paid'&&d.type==='special').reduce((s,d)=>s+Number(d.amount),0);
    const myLoans=APP.loans.filter(l=>String(l.memberId)===String(m.memberid)||String(l.memberId)===mId);
    const loanOut=myLoans.reduce((s,l)=>{const total=Number(l.totalPayable)||calcLoan(l.amount,l.rate,l.months).totalPayable;return s+(total-Number(l.repaid));},0);
    const intEarned=myLoans.reduce((s,l)=>s+(Number(l.interest)||calcLoan(l.amount,l.rate,l.months).interest),0);
    const totalIn=initial+dues+special;
    const net=totalIn-loanOut;
    return{m,initial,dues,special,intEarned,totalIn,loanOut,net};
  });

  function renderReportMemPage(page){
    const totalPages=Math.max(1,Math.ceil(reportMemData.length/RPG));
    page=Math.max(1,Math.min(page,totalPages));
    const start=(page-1)*RPG;
    const pageData=reportMemData.slice(start,start+RPG);
    const body=document.getElementById('report-mem-body');
    if(!body)return;
    body.innerHTML=pageData.map(({m,initial,dues,special,intEarned,totalIn,loanOut,net})=>`<tr>
      <td style="${tdStyle}"><div style="display:flex;align-items:center;gap:8px"><div class="av" style="width:28px;height:28px;font-size:10px;flex-shrink:0;overflow:hidden;padding:0">${m.photourl?`<img src="${m.photourl.replace('uc?export=view','thumbnail?sz=w60')}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.style.display='none';this.parentElement.textContent='${ini(m.fullname)}'">`:`${ini(m.fullname)}`}</div><div><div style="font-weight:700;color:var(--primary);font-size:12px">${m.fullname}</div><div style="font-size:10px;color:var(--muted)">${m.memberid||'—'}</div></div></div></td>
      <td style="${tdStyle}">${fmt(initial)}</td>
      <td style="${tdStyle}">${fmt(dues)}</td>
      <td style="${tdStyle}">${fmt(special)}</td>
      <td style="${tdStyle};color:var(--warning)">${fmt(intEarned)}</td>
      <td style="${tdStyle};font-weight:700;color:var(--primary)">${fmt(totalIn)}</td>
      <td style="${tdStyle};font-weight:700;color:${loanOut>0?'var(--secondary)':'var(--success)'}">${loanOut>0?fmt(loanOut):'—'}</td>
      <td style="${tdStyle};font-weight:700;color:${net>=0?'var(--success)':'var(--secondary)'}">${fmt(net)}</td>
    </tr>`).join('');
    const pgDiv=document.getElementById('report-mem-pagination');
    if(!pgDiv)return;
    const pages=Array.from({length:totalPages},(_,i)=>i+1);
    pgDiv.innerHTML=`
      <div style="font-size:12px;color:var(--muted)">Showing <strong>${start+1}–${Math.min(start+RPG,reportMemData.length)}</strong> of <strong>${reportMemData.length}</strong> members</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <button onclick="window.__reportMemPage(${page-1})" ${page===1?'disabled':''} style="padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:${page===1?'#f3f4f6':'white'};color:${page===1?'var(--muted)':'var(--primary)'};cursor:${page===1?'not-allowed':'pointer'};font-size:12px;font-weight:600">‹ Prev</button>
        ${pages.map(p=>`<button onclick="window.__reportMemPage(${p})" style="padding:5px 11px;border:1px solid ${p===page?'var(--primary)':'var(--border)'};border-radius:6px;background:${p===page?'var(--primary)':'white'};color:${p===page?'white':'var(--text)'};cursor:pointer;font-size:12px;font-weight:${p===page?'700':'400'}">${p}</button>`).join('')}
        <button onclick="window.__reportMemPage(${page+1})" ${page===totalPages?'disabled':''} style="padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:${page===totalPages?'#f3f4f6':'white'};color:${page===totalPages?'var(--muted)':'var(--primary)'};cursor:${page===totalPages?'not-allowed':'pointer'};font-size:12px;font-weight:600">Next ›</button>
      </div>`;
  }
  window.__reportMemPage=renderReportMemPage;
  renderReportMemPage(1);
  setTimeout(()=>{
    const gc=document.getElementById('c-growth');
    if(gc)CHARTS['c-growth']=new Chart(gc,{type:'line',data:{labels:['Jan 23','Apr 23','Jul 23','Oct 23','Jan 24','Apr 24','Jul 24','Oct 24','Jan 25','Mar 25'],datasets:[{label:'Group Fund',data:[25000,38500,52000,66000,79500,88000,96500,105000,114000,120000],borderColor:'#003366',backgroundColor:'rgba(0,51,102,0.08)',fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:'#003366'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'Rs '+v.toLocaleString()}},x:{grid:{display:false}}}}});
  },120);
}

async function postNotice(){
  const title=document.getElementById('nt')?.value.trim();
  const msg=document.getElementById('nm')?.value.trim();
  const editId=document.getElementById('notice-edit-id')?.value;
  if(!title||!msg){alert('Please fill in both title and message.');return;}
  showLoader(editId?'Updating notice...':'Posting notice...');
  if(editId){const n=APP.notifications.find(x=>String(x.id)===String(editId));if(n){n.title=title;n.body=msg;await updateSheet('Notifications',editId,{title,body:msg});}}
  else{addNotification(title,msg,'notice','📢');}
  hideLoader();document.getElementById('notice-ok').classList.remove('hidden');
  setTimeout(()=>renderAdminNotices(document.getElementById('admin-main')),1000);
}

function startEditNotice(id){
  const n=APP.notifications.find(x=>String(x.id)===String(id));if(!n)return;
  document.getElementById('nt').value=n.title;document.getElementById('nm').value=n.body;
  document.getElementById('notice-edit-id').value=id;
  document.getElementById('notice-form-title').textContent='✏️ Edit Notice';
  document.getElementById('notice-submit-btn').textContent='Update Notice';
  document.getElementById('notice-cancel-btn').classList.remove('hidden');
  document.getElementById('nt').focus();document.getElementById('nt').scrollIntoView({behavior:'smooth',block:'center'});
}

function cancelEditNotice(){
  document.getElementById('nt').value='';document.getElementById('nm').value='';
  document.getElementById('notice-edit-id').value='';
  document.getElementById('notice-form-title').textContent='Post New Notice';
  document.getElementById('notice-submit-btn').textContent='Post Notice';
  document.getElementById('notice-cancel-btn').classList.add('hidden');
}

async function deleteNotice(id){
  if(!confirm('Delete this notice?'))return;showLoader('Deleting...');
  APP.notifications=APP.notifications.filter(n=>String(n.id)!==String(id));
  await deleteFromSheet('Notifications',id);hideLoader();
  renderAdminNotices(document.getElementById('admin-main'));
}

function toggleAllTypeFilters(allCb){
  document.querySelectorAll('.fh-type-cb').forEach(cb=>cb.checked=allCb.checked);
  window.__fhGoTo(1,true);
}

function onTypeFilterChange(){
  const allCbs=[...document.querySelectorAll('.fh-type-cb')];
  const checkedCount=allCbs.filter(cb=>cb.checked).length;
  const allCb=document.getElementById('fh-type-all');
  if(allCb){
    allCb.checked=checkedCount===allCbs.length;
    allCb.indeterminate=checkedCount>0&&checkedCount<allCbs.length;
  }
  window.__fhGoTo(1,true);
}

function getSelectedTypes(){
  const cbs=[...document.querySelectorAll('.fh-type-cb')];
  if(!cbs.length) return 'all';
  const checked=cbs.filter(cb=>cb.checked).map(cb=>cb.value);
  if(checked.length===0||checked.length===cbs.length) return 'all';
  return checked;
}

// ── FINANCIAL HISTORY ─────────────────────────────────────
function renderFinHistory(el){
  // FIX 8: sorted by member ID
  const verified=memberSort(APP.members.filter(m=>m.status==='verified'));
  const PAGE_SIZE=5;let currentPage=1;let openPanels=new Set();
function getFiltered(){
    const memberFilter=document.getElementById('fh-member')?.value||'all';
    const typeFilter=document.getElementById('fh-type')?.value||'all';
    const yearFilter=document.getElementById('fh-year')?.value||'all';
    return verified.filter(m=>{
      if(memberFilter!=='all'&&String(m.memberid||m.id)!==memberFilter)return false;
      const mId=String(m.memberid||m.id);
      const mDues=APP.dues.filter(d=>String(d.memberId)===mId||String(d.memberId)===String(m.id));
      if(typeFilter!=='all'){
        const has=mDues.some(d=>d.type===typeFilter&&d.status==='paid');
        if(!has)return false;
      }
      if(yearFilter!=='all'){
        const has=mDues.some(d=>{
          const dYear=String(d.year||'').trim()||String(d.date||'').split('-')[0];
          return String(dYear)===String(yearFilter)&&d.status==='paid';
        });
        if(!has)return false;
      }
      return true;
    });
  }
  function getMemberData(m, selectedTypes, yearFilter){
    const mId=String(m.memberid||m.id);

    // all paid dues for this member
    let allDues=APP.dues.filter(d=>(String(d.memberId)===mId||String(d.memberId)===String(m.id))&&d.status==='paid');

    // apply year filter
    if(yearFilter&&yearFilter!=='all') allDues=allDues.filter(d=>{
      const dYear=String(d.year||d.date||'').split('-')[0].trim();
      return dYear===String(yearFilter);
    });

    // apply type filter to both transaction list AND summary cards
    const mDues = (selectedTypes&&selectedTypes!=='all') ? allDues.filter(d=>selectedTypes.includes(d.type)) : allDues;

    const loans=APP.loans.filter(l=>String(l.memberId)===mId||String(l.memberId)===String(m.id));

    const monthly=mDues.filter(d=>d.type==='monthly').reduce((s,d)=>s+Number(d.amount),0);
    const special=mDues.filter(d=>d.type==='special').reduce((s,d)=>s+Number(d.amount),0);
    const initial=mDues.filter(d=>d.type==='initial').reduce((s,d)=>s+Number(d.amount),0);
    const loanRepay=mDues.filter(d=>d.type==='loan_repayment').reduce((s,d)=>s+Number(d.amount),0);
    const loanFee=mDues.filter(d=>d.type==='loan-fee').reduce((s,d)=>s+Number(d.amount),0);
    const other=mDues.filter(d=>!['monthly','special','initial','loan_repayment','loan-fee'].includes(d.type)).reduce((s,d)=>s+Number(d.amount),0);
    const loanOut=loans.reduce((s,l)=>s+(Number(l.amount)-Number(l.repaid)),0);
    const total=initial+monthly+special+loanRepay+loanFee+other;

    return{mDues,loans,monthly,special,initial,loanRepay,loanFee,other,loanOut,total};
  }

function exportFinHistory(){
  const rows=[['Date','Member','Type','Amount','Mode','Note']];
  APP.dues.forEach(d=>{rows.push([d.date||'',d.memberName||'',d.type||'',d.amount||'',d.paymode||'',d.note||'']);});
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='financial_history_'+todayBS()+'.csv';a.click();
}

async function saveDueEdit(dueId){
  const d=APP.dues.find(x=>String(x.id)===String(dueId));
  const errEl=document.getElementById('ed-err');if(!d)return;
  const amount=Number(document.getElementById('ed-amount').value);
  const date=document.getElementById('ed-date').value.trim();
  errEl.classList.add('hidden');
  if(!amount||amount<=0){errEl.textContent='Please enter a valid amount.';errEl.classList.remove('hidden');return;}
  if(!date){errEl.textContent='Please enter a valid date.';errEl.classList.remove('hidden');return;}
  showLoader('Saving correction...');
  d.amount=amount;d.date=date;d.type=document.getElementById('ed-type').value;
  d.month=document.getElementById('ed-month').value.trim();d.note=document.getElementById('ed-note').value.trim();d.year=date.split('-')[0]||d.year;
  await updateSheet('Dues',dueId,{amount,date,type:d.type,month:d.month,note:d.note,year:d.year});
  hideLoader();document.getElementById('profile-modal-bg').classList.remove('open');
  const currentTab=localStorage.getItem('hs_admin_tab')||'dashboard';
  if(currentTab==='fin-history')renderFinHistory(document.getElementById('admin-main'));
  else if(currentTab==='funds')renderAdminFunds(document.getElementById('admin-main'));
  else if(currentTab==='dashboard')renderAdminDash(document.getElementById('admin-main'));
  addNotification('Payment Record Updated',`Corrected ${fmt(amount)} entry dated ${date}.`,'success','✏️');
}

async function deleteDueRecord(dueId,memberName){
  if(!confirm(`Delete this payment record for ${memberName||'this member'}?\n\nThis cannot be undone.`))return;
  showLoader('Deleting payment record...');
  APP.dues=APP.dues.filter(x=>String(x.id)!==String(dueId));
  await deleteFromSheet('Dues',dueId);hideLoader();
  addNotification('Payment Record Deleted',`A payment record was deleted for ${memberName||'a member'}.`,'warning','🗑️');
  renderFinHistory(document.getElementById('admin-main'));
}

async function saveExpense(){
  const amount=Number(document.getElementById('exp-amount').value);
  const desc=document.getElementById('exp-desc').value.trim();
  const errEl=document.getElementById('exp-err');const okEl=document.getElementById('exp-ok');
  errEl.classList.add('hidden');okEl.classList.add('hidden');
  if(!amount||amount<=0){errEl.textContent='Please enter a valid amount.';errEl.classList.remove('hidden');return;}
  if(!desc){errEl.textContent='Please enter a description.';errEl.classList.remove('hidden');return;}
  showLoader('Uploading receipt and saving...');
  const receiptFile=document.getElementById('exp-receipt-inp')?.files[0];
  let receiptUrl='';
  if(receiptFile){showLoader('Uploading receipt to Google Drive...');receiptUrl=await uploadFileToGDrive(receiptFile,'receipt_'+Date.now())||'';}
  showLoader('Saving expense record...');
  const expense={id:Date.now(),date:document.getElementById('exp-date').value,category:document.getElementById('exp-cat').value,description:desc,paidTo:document.getElementById('exp-paidto').value.trim(),amount,receiptUrl};
  const result=await saveToSheet('Expenses',expense);
  if(result&&!result.error){APP.expenses.push(expense);addNotification('Expense Recorded',`${fmt(amount)} recorded under ${expense.category} — ${desc}`,'warning','💸');await loadAllData('Refreshing data...');updateBadges();hideLoader();okEl.classList.remove('hidden');setTimeout(()=>{renderAdminExpenses(document.getElementById('admin-main'));},1200);}
  else{hideLoader();errEl.textContent='Failed to save. Check your connection and try again.';errEl.classList.remove('hidden');}
}

async function saveExpenseEdit(expId){
  const e=APP.expenses.find(x=>String(x.id)===String(expId));
  const errEl=document.getElementById('ee-err');if(!e)return;
  const amount=Number(document.getElementById('ee-amount').value);
  const desc=document.getElementById('ee-desc').value.trim();
  errEl.classList.add('hidden');
  if(!amount||amount<=0){errEl.textContent='Please enter a valid amount.';errEl.classList.remove('hidden');return;}
  if(!desc){errEl.textContent='Description is required.';errEl.classList.remove('hidden');return;}
  showLoader('Saving correction...');
  e.category=document.getElementById('ee-cat').value;e.amount=amount;
  e.date=document.getElementById('ee-date').value.trim();e.description=desc;e.paidTo=document.getElementById('ee-paidto').value.trim();
  await updateSheet('Expenses',expId,{category:e.category,amount,date:e.date,description:e.description,paidTo:e.paidTo});
  hideLoader();document.getElementById('profile-modal-bg').classList.remove('open');
  renderAdminExpenses(document.getElementById('admin-main'));
}

async function deleteExpense(id){
  if(!confirm('Delete this expense record?'))return;showLoader('Deleting...');
  APP.expenses=APP.expenses.filter(e=>String(e.id)!==String(id));
  await deleteFromSheet('Expenses',id);hideLoader();
  renderAdminExpenses(document.getElementById('admin-main'));
}

function exportExpenses(){
  const rows=[['Date','Category','Description','Paid To','Amount','Receipt']];
  APP.expenses.forEach(e=>{rows.push([e.date,e.category,e.description,e.paidTo,e.amount,e.receiptUrl||'']);});
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='expenses_'+todayBS()+'.csv';a.click();
}

function viewReceipt(url,description){

  document.getElementById('pm-header').innerHTML=`<h3>🧾 Receipt — ${description||'Expense'}</h3><button onclick="document.getElementById('profile-modal-bg').classList.remove('open')" style="background:none;border:none;color:white;font-size:22px;cursor:pointer">&times;</button>`;
  const isImage=url.match(/\.(jpg|jpeg|png|gif|webp)/i)||url.includes('thumbnail')||url.includes('drive.google.com');

async function approveProfileRequest(id){
  const r=(APP.profileRequests||[]).find(x=>String(x.id)===String(id));if(!r)return;
  const mem=getMember(r.memberId);if(!mem){alert('Member not found.');return;}
  if(!confirm(`Approve profile changes for ${r.memberName}?`))return;
  showLoader('Applying profile changes...');
  const updates={phone:r.phone||mem.phone,email:r.email||mem.email,occupation:r.occupation||mem.occupation,gender:r.gender||mem.gender,address:r.address||mem.address,fathername:r.fathername||mem.fathername,grandfathername:r.grandfathername||mem.grandfathername,spousename:r.spousename||mem.spousename,photourl:r.photourl||mem.photourl};
  Object.assign(mem,updates);await updateSheet('Members',mem.id,updates);
  r.status='approved';await updateSheet('ProfileRequests',id,{status:'approved'});
  addNotification('Profile Updated ✅','Your profile change request has been approved.','success','✅',r.memberId);
  hideLoader();updateBadges();renderProfileRequests(document.getElementById('admin-main'));
  alert(`✅ Profile changes approved for ${r.memberName}!`);
}

async function rejectProfileRequest(id){
  const r=(APP.profileRequests||[]).find(x=>String(x.id)===String(id));if(!r)return;
  const reason=prompt('Reason for rejection:','Information could not be verified');if(reason===null)return;
  showLoader('Rejecting request...');r.status='rejected';
  await updateSheet('ProfileRequests',id,{status:'rejected',rejectReason:reason});
  addNotification('Profile Request Rejected',`Your profile change request was not approved. Reason: ${reason}`,'warning','❌',r.memberId);
  hideLoader();updateBadges();renderProfileRequests(document.getElementById('admin-main'));
}

let bulkRowCount=5;
function bulkRow(n){return`<tr id="bulk-row-${n}"><td style="padding:6px 8px;border:1px solid var(--border);text-align:center;font-size:12px;color:var(--muted)">${n}</td><td style="padding:4px 6px;border:1px solid var(--border)"><input type="text" placeholder="e.g. Ram Bahadur Thapa" oninput="autoUsername(this,${n})" style="width:100%;border:none;font-size:12px;padding:4px;outline:none" id="br-name-${n}"></td><td style="padding:4px 6px;border:1px solid var(--border)"><input type="text" placeholder="HMS-001" style="width:100%;border:none;font-size:12px;padding:4px;outline:none;font-weight:700;color:var(--primary)" id="br-mid-${n}"></td><td style="padding:4px 6px;border:1px solid var(--border)"><input type="text" placeholder="ram_thapa" style="width:100%;border:none;font-size:12px;padding:4px;outline:none" id="br-user-${n}"></td><td style="padding:4px 6px;border:1px solid var(--border)"><input type="text" placeholder="Custom password" style="width:100%;border:none;font-size:12px;padding:4px;outline:none" id="br-pass-${n}"></td><td style="padding:4px 6px;border:1px solid var(--border)"><input type="email" placeholder="email@example.com" style="width:100%;border:none;font-size:12px;padding:4px;outline:none" id="br-email-${n}"></td><td style="padding:4px 6px;border:1px solid var(--border)"><select id="br-role-${n}" style="width:100%;border:none;font-size:12px;padding:4px;outline:none;background:transparent"><option>Member</option><option>President</option><option>Secretary</option><option>Treasurer</option></select></td><td style="padding:4px 6px;border:1px solid var(--border);text-align:center"><button onclick="removeBulkRow(${n})" style="background:#fee2e2;color:#991b1b;border:none;border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px">✕</button></td></tr>`;}
function addBulkRow(){bulkRowCount++;document.getElementById('bulk-rows').insertAdjacentHTML('beforeend',bulkRow(bulkRowCount));}
function removeBulkRow(n){const row=document.getElementById('bulk-row-'+n);if(row)row.remove();}
function autoUsername(nameInput,n){const name=nameInput.value.trim().toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');const userInput=document.getElementById('br-user-'+n);if(userInput&&!userInput.dataset.edited)userInput.value=name;}

async function submitBulkAdd(){
  const okEl=document.getElementById('bulk-add-ok');const errEl=document.getElementById('bulk-add-err');
  okEl.classList.add('hidden');errEl.classList.add('hidden');
  const rows=document.querySelectorAll('#bulk-rows tr');const members=[];const errors=[];
  rows.forEach(row=>{
    const n=row.id.replace('bulk-row-','');
    const name=document.getElementById('br-name-'+n)?.value.trim();const mid=document.getElementById('br-mid-'+n)?.value.trim();
    const user=document.getElementById('br-user-'+n)?.value.trim();const pass=document.getElementById('br-pass-'+n)?.value.trim();
    const role=document.getElementById('br-role-'+n)?.value;
    if(!name&&!mid&&!user)return;
    if(!name){errors.push(`Row ${n}: Full name required`);return;}if(!mid){errors.push(`Row ${n}: Member ID required`);return;}
    if(!user){errors.push(`Row ${n}: Username required`);return;}if(!pass){errors.push(`Row ${n}: Password required`);return;}
    if(APP.members.some(m=>m.username===user)){errors.push(`Row ${n}: Username "${user}" already exists`);return;}
    if(APP.members.some(m=>m.memberid===mid)){errors.push(`Row ${n}: Member ID "${mid}" already assigned`);return;}
    const email=document.getElementById('br-email-'+n)?.value.trim();
    members.push({name,mid,user,pass,role,email});
  });
  if(errors.length>0){errEl.textContent=errors.join(' | ');errEl.classList.remove('hidden');return;}
  if(members.length===0){errEl.textContent='No valid rows found.';errEl.classList.remove('hidden');return;}
  if(!confirm(`Create ${members.length} member account(s)?`))return;
  showLoader(`Creating ${members.length} accounts...`);
  const created=[];
  for(const mem of members){
    const hashedPass=await hashPassword(mem.pass);
    const m={id:Date.now()+Math.floor(Math.random()*9999),memberid:mem.mid,username:mem.user,password:hashedPass,fullname:mem.name,role:mem.role||'Member',gender:'',occupation:'',citizenno:'',issuedate:'',address:'',phone:'',email:mem.email||'',fathername:'',grandfathername:'',spousename:'',status:'verified',joined:todayBS(),photourl:'',docfront:'',docback:''};
    await saveToSheet('Members',m);APP.members.push(m);
    if(mem.email){await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'sendWelcomeEmail',to:mem.email,name:mem.name,username:mem.user,memberId:mem.mid,password:mem.pass,website:'https://hatemalosamuha.vercel.app'})});}
    created.push({...mem,fullname:mem.name});
  }
  hideLoader();updateBadges();
  okEl.textContent=`✅ ${created.length} account(s) created successfully!`;okEl.classList.remove('hidden');
  const waCard=document.getElementById('wa-card');const waMsg=document.getElementById('wa-messages');
  waCard.style.display='block';
  waMsg.innerHTML=created.map(mem=>{
    const msg=`नमस्ते ${mem.name} जी! 🙏\n\nहातेमालो समुहको डिजिटल पोर्टलमा तपाईंको खाता तयार भएको छ।\n\n🌐 Website: https://hatemalosamuha.vercel.app\n👤 Username: ${mem.user}\n🔑 Password: ${mem.pass}\n🪪 Member ID: ${mem.mid}\n\nकृपया लगइन गरी आफ्नो विवरण अपडेट गर्नुहोला।\n\nधन्यवाद 🙏`;
    return`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px;margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:700;color:var(--primary)">${mem.name} — ${mem.mid}</div><button onclick="copyMsg(this)" data-msg="${encodeURIComponent(msg)}" style="font-size:11px;padding:4px 10px;background:var(--primary);color:white;border:none;border-radius:6px;cursor:pointer">📋 Copy</button></div><pre style="font-size:11px;white-space:pre-wrap;color:#374151;font-family:'Poppins',sans-serif;margin:0">${msg}</pre></div>`;
  }).join('');
}
function copyMsg(btn){const msg=decodeURIComponent(btn.getAttribute('data-msg'));navigator.clipboard.writeText(msg).then(()=>{btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2000);});}

async function approveLoanRequest(id){
  const finalAmountEl=document.getElementById('ap-final');const rateEl=document.getElementById('ap-rate');const monthsEl=document.getElementById('ap-months');
  const finalAmount=finalAmountEl?Number(finalAmountEl.value):0;const rate=rateEl?Number(rateEl.value):12;const months=monthsEl?Number(monthsEl.value):12;
  if(!finalAmount||finalAmount<=0){alert('Please enter the final approved amount before approving.');if(finalAmountEl)finalAmountEl.focus();return;}
  if(!confirm(`Approve loan of ${fmt(finalAmount)} at ${rate}% for ${months} months?`))return;
  const pdfInputSnapshot={finalAmount,rate,months,savings:document.getElementById('ap-savings')?.value||'—',savingsDue:document.getElementById('ap-savings-due')?.value||'—',rec1:document.getElementById('ap-rec1')?.value||'—',rec2:document.getElementById('ap-rec2')?.value||'—',colVal:document.getElementById('ap-collateral-val')?.value||'—',commDate:document.getElementById('ap-committee-date')?.value||'—'};
  showLoader('Approving loan...');
  const req=APP.loanRequests.find(l=>String(l.id)===String(id));if(!req){hideLoader();return;}
  req.status='approved';req.approvedAmount=finalAmount;
  await updateSheet('LoanRequests',id,{status:'approved',approvedAmount:finalAmount,approvedRate:rate,approvedMonths:months,approvedOn:todayBS()});
  const calc=calcLoan(finalAmount,rate,months);
  const newLoan={id:Date.now(),memberId:req.memberId,amount:finalAmount,interest:calc.interest,totalPayable:calc.totalPayable,monthlyInstallment:calc.monthlyInstallment,issued:todayBS(),due:'',repaid:0,interestPaid:0,rate,months,status:'active',purpose:req.purpose||req.loanType||''};
  APP.loans.push(newLoan);await saveToSheet('Loans',newLoan);
  const loanMember=getMember(req.memberId);
  addNotification('Loan Approved',`Loan of ${fmt(finalAmount)} approved for ${req.memberName||req.memberId}!`,'success','✅',loanMember?.memberid||req.memberId);
  const memberEmail=loanMember?.email||'';
  if(memberEmail){try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'sendLoanApprovalEmail',to:memberEmail,memberName:loanMember?.fullname||req.memberName||'',memberId:loanMember?.memberid||req.memberId||'',loanType:req.loanType||newLoan.purpose||'',principal:finalAmount,interest:calc.interest,rate,totalPayable:calc.totalPayable,monthly:calc.monthlyInstallment,months,issued:newLoan.issued})});}catch(e){}}
  showLoader('Generating PDF...');
  const pdfUrl=await saveLoanPDFWithSnapshot(id,pdfInputSnapshot);
  if(pdfUrl){req.pdfUrl=pdfUrl;await updateSheet('LoanRequests',id,{pdfUrl});}
  hideLoader();
  document.getElementById('profile-modal-bg').classList.remove('open');
  updateBadges();await loadAllData('Refreshing loan data...');
  renderAdminLoans(document.getElementById('admin-main'));
}
