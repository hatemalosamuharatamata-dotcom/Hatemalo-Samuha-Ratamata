ius:8px;padding:14px;background:#f8faff"><div style="font-weight:700;color:#003366;text-align:center;border-bottom:1px solid #ddd;padding-bottom:6px;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em">कार्यालय प्रयोजनका लागि (Office Use Only)</div><div style="margin-bottom:8px;line-height:2">बचत रकम रु. <strong style="color:#003366">${savings}</strong> रहेको छ। &nbsp; यस महिनाको बचत बुझाउन बाँकी: <strong>${savingsDue}</strong></div><div style="border-top:1px dashed #999;margin:10px 0"></div><div style="margin-bottom:6px;line-height:2">जाँचबुझ गरी रु. <strong style="color:#003366">${isNaN(Number(rec1))?rec1:Number(rec1).toLocaleString()}</strong> सम्म ऋण प्रदान गर्न <strong>स्वीकृत / सिफारीस</strong> गरिएको छ।</div><div style="border-top:1px dashed #999;margin:10px 0"></div><div style="margin-bottom:6px;line-height:2">सिफारिसको आधारमा रु. <strong style="color:#003366">${isNaN(Number(rec2))?rec2:Number(rec2).toLocaleString()}</strong> ऋण प्रदान गर्न <strong>स्वीकृत / सिफारिस</strong> गरिन्छ।</div><div style="border-top:1px dashed #999;margin:10px 0"></div><div style="line-height:2.2">धितोको मूल्य रु. <strong>${isNaN(Number(colVal))?colVal:Number(colVal).toLocaleString()}</strong> पर्ने देखिएकोले उप-समितिको मिति <strong>${commDate}</strong> मा बसेको निर्णय अनुसार रु. <strong style="color:#cc0000;font-size:14px">${Number(finalAmount).toLocaleString()}</strong> ऋण प्रदान गर्न <strong>स्वीकृत / सिफारिस</strong> गरिएको छ।<br>ब्याज दर: <strong>${rate}%</strong> &nbsp;&nbsp; ऋण अवधि: <strong>${months} महिना</strong></div><div style="text-align:center;margin:12px 0"><div style="display:inline-block;border:3px solid #16a34a;border-radius:8px;padding:6px 18px;color:#16a34a;font-size:15px;font-weight:700;transform:rotate(-3deg)">✅ APPROVED — Rs ${Number(finalAmount).toLocaleString()}</div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:14px"><div style="text-align:center"><div style="height:40px;border-bottom:1px solid #555;margin-bottom:4px"></div><div style="font-size:10px;color:#666">सदस्य, ऋण उप-समिति</div></div><div style="text-align:center"><div style="height:40px;border-bottom:1px solid #555;margin-bottom:4px"></div><div style="font-size:10px;color:#666">सदस्य, ऋण उप-समिति</div></div><div style="text-align:center"><div style="height:40px;border-bottom:1px solid #555;margin-bottom:4px"></div><div style="font-size:10px;color:#666">अध्यक्ष, ऋण उप-समिति</div></div></div></div>`;
  try{
    document.body.appendChild(wrapper);
    await new Promise(r=>setTimeout(r,600));
    const canvas=await html2canvas(wrapper,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:900,windowWidth:900,logging:false});
    document.body.removeChild(wrapper);
    if(!canvas||canvas.width===0||canvas.height===0){console.warn('Canvas is empty');return null;}
    const base64=canvas.toDataURL('image/jpeg',0.92).split(',')[1];
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'uploadFile',fileName:'LoanApproval_'+(req.memberName||'member').replace(/\s/g,'_')+'_'+id+'.jpg',base64Data:base64,mimeType:'image/jpeg'})});
    const data=await res.json();
    return data.viewUrl||data.url||null;
  }catch(e){
    if(document.body.contains(wrapper))document.body.removeChild(wrapper);
    console.warn('PDF save failed:',e.message);return null;
  }
}

async function printAndSaveLoan(id){
  const snap={finalAmount:Number(document.getElementById('ap-final')?.value||0),rate:Number(document.getElementById('ap-rate')?.value||12),months:Number(document.getElementById('ap-months')?.value||12),savings:document.getElementById('ap-savings')?.value||'—',savingsDue:document.getElementById('ap-savings-due')?.value||'—',rec1:document.getElementById('ap-rec1')?.value||'—',rec2:document.getElementById('ap-rec2')?.value||'—',colVal:document.getElementById('ap-collateral-val')?.value||'—',commDate:document.getElementById('ap-committee-date')?.value||'—'};

        <div style="font-size:12px;color:var(--muted);margin-top:3px">📅 ${m.date||'—'}${m.venue?` &nbsp;·&nbsp; 📍 ${m.venue}`:''}</div>
        ${m.agenda?`<div style="font-size:12px;color:#374151;margin-top:5px;background:#f8faff;padding:8px 10px;border-radius:6px;border-left:3px solid var(--primary)">${m.agenda}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">

        <button class="btn-sm btn-sm-b" onclick="toggleAttendancePanel('${m.id}')">✏️ Attendance</button>
        <button class="btn-sm" onclick="startEditMeeting('${m.id}')">Edit</button>
        <button class="btn-sm btn-sm-r" onclick="deleteMeeting('${m.id}')">Del</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#dcfce7;color:#166534">✓ Present: ${present}</span>
      <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#dbeafe;color:#1e40af">↔ Represented: ${repd}</span>
      <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:#fee2e2;color:#991b1b">✗ Absent: ${absent}</span>
      ${unmark>0?`<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:#f3f4f6;color:var(--muted)">— Unmarked: ${unmark}</span>`:''}
    </div>
    <div id="att-panel-${m.id}" style="display:none;margin-top:10px">
      <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">Record Attendance</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed">
          <thead><tr style="background:#f8fafc">
            <th style="padding:8px 10px;border:1px solid var(--border);text-align:left;font-size:11px;color:var(--muted);width:28%">Member</th>

function buildRepSelect(mtgId,memberId,savedRep,status){
  if(status!=='represented')return'<span style="font-size:11px;color:var(--muted)">—</span>';
  const others=APP.members.filter(x=>x.status==='verified'&&String(x.memberid||x.id)!==String(memberId));
  const isOther=savedRep&&savedRep.repType==='other';
  const savedId=(!isOther&&savedRep)?(savedRep.repId||''):'';
  const savedName=(isOther&&savedRep)?(savedRep.repName||''):'';
  const savedPhone=(isOther&&savedRep)?(savedRep.repPhone||''):'';
  const savedRel=(isOther&&savedRep)?(savedRep.repRelation||''):'';
  return`<div id="rep-wrap-${mtgId}-${memberId}">
    <select id="rep-type-${mtgId}-${memberId}" onchange="handleRepTypeChange('${mtgId}','${memberId}',this)" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:white;margin-bottom:6px">
      <option value="">— Select representative —</option>
      <optgroup label="Group Members">${others.map(o=>`<option value="member:${o.memberid||o.id}" ${savedId===String(o.memberid||o.id)?'selected':''}>${o.fullname} (${o.memberid||'—'})</option>`).join('')}</optgroup>
      <optgroup label="Outside Group"><option value="other" ${isOther?'selected':''}>Other person (not a member)</option></optgroup>
    </select>
    <div id="rep-other-fields-${mtgId}-${memberId}" style="display:${isOther?'grid':'none'};grid-template-columns:1fr 1fr;gap:6px;margin-top:4px">
      <input type="text" id="rep-other-name-${mtgId}-${memberId}" placeholder="Full name *" value="${savedName}" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;grid-column:1/-1">
      <input type="text" id="rep-other-phone-${mtgId}-${memberId}" placeholder="Phone number" value="${savedPhone}" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px">
      <input type="text" id="rep-other-rel-${mtgId}-${memberId}" placeholder="Relation (e.g. Son, Wife)" value="${savedRel}" style="padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px">
    </div>
  </div>`;
}

function handleAttStatusChange(mtgId,memberId,sel){const cell=document.getElementById(`rep-cell-${mtgId}-${memberId}`);if(cell)cell.innerHTML=buildRepSelect(mtgId,memberId,null,sel.value);}
function handleRepTypeChange(mtgId,memberId,sel){const otherFields=document.getElementById(`rep-other-fields-${mtgId}-${memberId}`);if(!otherFields)return;otherFields.style.display=sel.value==='other'?'grid':'none';}

async function saveAttendance(mtgId){
  const mtg=(APP.meetings||[]).find(x=>String(x.id)===String(mtgId));if(!mtg)return;
  const verified=APP.members.filter(x=>x.status==='verified');const att={};
  verified.forEach(mem=>{
    const mid=String(mem.memberid||mem.id);const statusSel=document.querySelector(`#att-row-${mtgId}-${mid} select`);const status=statusSel?statusSel.value:'absent';
    if(status!=='represented'){att[mid]={status,repType:'',repId:'',repName:'',repPhone:'',repRelation:''};return;}
    const typeSel=document.getElementById(`rep-type-${mtgId}-${mid}`);const typeVal=typeSel?typeSel.value:'';
    if(typeVal==='other'){att[mid]={status,repType:'other',repId:'',repName:document.getElementById(`rep-other-name-${mtgId}-${mid}`)?.value.trim()||'',repPhone:document.getElementById(`rep-other-phone-${mtgId}-${mid}`)?.value.trim()||'',repRelation:document.getElementById(`rep-other-rel-${mtgId}-${mid}`)?.value.trim()||''};}
    else if(typeVal.startsWith('member:')){const repMemberId=typeVal.replace('member:','');const repMem=getMember(repMemberId);att[mid]={status,repType:'member',repId:repMemberId,repName:repMem?repMem.fullname:'',repPhone:repMem?(repMem.phone||''):'',repRelation:'Member'};}
    else{att[mid]={status,repType:'',repId:'',repName:'',repPhone:'',repRelation:''};}
  });
  const lines=APP.members.filter(x=>x.status==='verified').map(mem=>{const mid=String(mem.memberid||mem.id);const rec=att[mid]||{};const s=rec.status||'absent';if(s==='present')return`${mem.fullname} (${mid}): Present`;if(s==='represented'){const repType=rec.repType||'';if(repType==='member')return`${mem.fullname} (${mid}): Represented by ${rec.repName||'?'} (${rec.repId||'?'}) — Member`;if(repType==='other'){const parts=[rec.repName||'?'];if(rec.repPhone)parts.push(rec.repPhone);if(rec.repRelation)parts.push(rec.repRelation);return`${mem.fullname} (${mid}): Represented by ${parts.join(' · ')} — Non-member`;}return`${mem.fullname} (${mid}): Represented by ${rec.repName||'?'}`;}return`${mem.fullname} (${mid}): Absent`;});
  const attendanceSummary=lines.join('\n');
  showLoader('Saving attendance...');
  mtg.attendance=JSON.stringify(att);mtg.attendanceSummary=attendanceSummary;
  await updateSheet('Meetings',mtgId,{attendance:mtg.attendance,attendanceSummary});
  hideLoader();
  const okEl=document.getElementById(`att-ok-${mtgId}`);if(okEl){okEl.classList.remove('hidden');setTimeout(()=>okEl.classList.add('hidden'),3000);}
  const card=document.getElementById(`mtg-card-${mtgId}`);
  if(card){const tmp=document.createElement('div');tmp.innerHTML=renderMeetingCard(mtg);const newCard=tmp.firstElementChild;card.replaceWith(newCard);}
}

async function saveMeeting(){
  const title=document.getElementById('mtg-title')?.value.trim();const date=document.getElementById('mtg-date')?.value.trim();
  const editId=document.getElementById('mtg-edit-id')?.value;
  const errEl=document.getElementById('mtg-err');const okEl=document.getElementById('mtg-ok');
  errEl.classList.add('hidden');okEl.classList.add('hidden');
  if(!title){errEl.textContent='Meeting title is required.';errEl.classList.remove('hidden');return;}
  if(!date){errEl.textContent='Date is required.';errEl.classList.remove('hidden');return;}
  showLoader('Uploading minutes and saving...');
  const pdfFile=document.getElementById('mtg-pdf-inp')?.files[0];
  let minutesUrl=editId?((APP.meetings||[]).find(x=>String(x.id)===String(editId))?.minutesUrl||''):'';
  if(pdfFile){showLoader('Uploading minutes to Google Drive...');minutesUrl=await uploadFileToGDrive(pdfFile,'minutes_'+Date.now())||minutesUrl;}
  showLoader('Saving meeting record...');
  if(editId){
    const mtg=(APP.meetings||[]).find(x=>String(x.id)===String(editId));
    if(mtg){mtg.title=title;mtg.date=date;mtg.venue=document.getElementById('mtg-venue')?.value.trim()||'';mtg.agenda=document.getElementById('mtg-agenda')?.value.trim()||'';mtg.minutesUrl=minutesUrl;await updateSheet('Meetings',editId,{title:mtg.title,date:mtg.date,venue:mtg.venue,agenda:mtg.agenda,minutesUrl:mtg.minutesUrl});}
    okEl.textContent='✅ Meeting updated!';
  }else{
    const mtg={id:Date.now(),title,date,venue:document.getElementById('mtg-venue')?.value.trim()||'',agenda:document.getElementById('mtg-agenda')?.value.trim()||'',minutesUrl,attendance:'{}'};
    if(!APP.meetings)APP.meetings=[];APP.meetings.push(mtg);await saveToSheet('Meetings',mtg);
    addNotification('New Meeting Scheduled',`${title} on ${date}`,'notice','📅');
    okEl.textContent='✅ Meeting created!';
  }
  hideLoader();okEl.classList.remove('hidden');cancelEditMeeting();
  setTimeout(()=>renderAdminMeetings(document.getElementById('admin-main')),1000);
}

function startEditMeeting(id){
  const m=(APP.meetings||[]).find(x=>String(x.id)===String(id));if(!m)return;
  document.getElementById('mtg-title').value=m.title||'';document.getElementById('mtg-date').value=m.date||'';
  document.getElementById('mtg-venue').value=m.venue||'';document.getElementById('mtg-agenda').value=m.agenda||'';
  document.getElementById('mtg-edit-id').value=id;
  document.getElementById('mtg-form-title').textContent='✏️ Edit Meeting';
  document.getElementById('mtg-submit-btn').textContent='Update Meeting';
  document.getElementById('mtg-cancel-btn').classList.remove('hidden');

  document.getElementById('mtg-title').scrollIntoView({behavior:'smooth',block:'center'});
}

function cancelEditMeeting(){
  document.getElementById('mtg-title').value='';document.getElementById('mtg-date').value=todayBS();
  document.getElementById('mtg-venue').value='';document.getElementById('mtg-agenda').value='';
  document.getElementById('mtg-edit-id').value='';
  document.getElementById('mtg-form-title').textContent='Schedule New Meeting';
  document.getElementById('mtg-submit-btn').textContent='+ Create Meeting';
  document.getElementById('mtg-cancel-btn').classList.add('hidden');
  document.getElementById('mtg-pdf-icon').textContent='📄';document.getElementById('mtg-pdf-name').textContent='Click to upload minutes';

async function deleteMeeting(id){
  if(!confirm('Delete this meeting and all its attendance records?'))return;showLoader('Deleting...');
  APP.meetings=(APP.meetings||[]).filter(x=>String(x.id)!==String(id));
  await deleteFromSheet('Meetings',id);hideLoader();
  renderAdminMeetings(document.getElementById('admin-main'));
}

async function generateExcelReport(){
  const month = document.getElementById('ex-month').value;
  const year  = document.getElementById('ex-year').value;
  const type  = document.getElementById('ex-type').value;
  const label = type==='yearly' ? `Year_${year}` : `${month}_${year}`;

  // Load SheetJS dynamically if not already loaded
  if(typeof XLSX === 'undefined'){
    await new Promise((resolve, reject)=>{
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  showLoader('Generating Excel report...');

  // ── Filter data ───────────────────────────────────────────
  function matchesPeriod(d){
    const dMonth = String(d.month||'');
    const dYear  = String(d.year || (d.date||'').split('-')[0] || '');
    if(type==='yearly') return dYear === String(year);
    return dMonth.startsWith(month) && dYear === String(year);
  }

  const filteredDues      = APP.dues.filter(d => d.status==='paid' && matchesPeriod(d));
  const filteredRepayments= APP.dues.filter(d => d.type==='loan_repayment' && matchesPeriod(d));
  const filteredExpenses  = (APP.expenses||[]).filter(e => {
    const eYear  = String((e.date||'').split('-')[0]);
    const eMonth = (e.date||'').substring(5,7);
    const monthIndex = ['Baisakh','Jestha','Asar','Shrawan','Bhadra','Ashwin','Kartik','Mangsir','Poush','Magh','Falgun','Chaitra'].indexOf(month)+1;
    if(type==='yearly') return eYear === String(year);
    return eYear === String(year) && parseInt(eMonth) === monthIndex;
  });

  const verifiedMembers   = memberSort(APP.members.filter(m=>m.status==='verified'));

  // ── Totals ────────────────────────────────────────────────
  const totalDuesAmt      = filteredDues.filter(d=>d.type!=='loan_repayment').reduce((s,d)=>s+Number(d.amount),0);
  const totalRepaidAmt    = filteredRepayments.reduce((s,d)=>s+Number(d.amount),0);
  const totalExpenseAmt   = filteredExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const monthlyDuesAmt    = filteredDues.filter(d=>d.type==='monthly').reduce((s,d)=>s+Number(d.amount),0);
  const initialAmt        = filteredDues.filter(d=>d.type==='initial').reduce((s,d)=>s+Number(d.amount),0);
  const specialAmt        = filteredDues.filter(d=>d.type==='special').reduce((s,d)=>s+Number(d.amount),0);
  const netFund           = totalDuesAmt + totalRepaidAmt - totalExpenseAmt;

  const wb = XLSX.utils.book_new();

  // ── Helper: style header row ──────────────────────────────
  // SheetJS CE doesn't support cell styles, so we use bold via a workaround comment row instead
  // We'll mark header rows clearly with ALL CAPS

  // ── SHEET 1: Summary ─────────────────────────────────────
  const summaryData = [
    ['HATEMALO SAMUHA — FINANCIAL REPORT'],
    [type==='yearly' ? `Full Year Report: BS ${year}` : `Monthly Report: ${month} ${year} (BS)`],
    ['Generated on:', todayBS()],
    [''],
    ['SUMMARY', ''],
    ['Total Members', verifiedMembers.length],
    ['Report Period', label],
    [''],
    ['INCOME', 'Amount (Rs)'],
    ['Monthly Dues Collected', monthlyDuesAmt],
    ['Initial Deposits', initialAmt],
    ['Special / Event Contributions', specialAmt],
    ['Loan Repayments Received', totalRepaidAmt],
    ['TOTAL INCOME', totalDuesAmt + totalRepaidAmt],
    [''],
    ['EXPENSES', 'Amount (Rs)'],
    ['Total Expenses', totalExpenseAmt],
    [''],
    ['NET FUND', 'Amount (Rs)'],
    ['Net Fund (Income − Expenses)', netFund],
    [''],
    ['LOANS (All Active)', ''],
    ['Total Loans Outstanding', APP.loans.filter(l=>l.status==='active').reduce((s,l)=>s+(Number(l.amount)-Number(l.repaid)),0)],
    ['Total Loan Principal Issued', APP.loans.reduce((s,l)=>s+Number(l.amount),0)],
    ['Total Repaid (all time)', APP.loans.reduce((s,l)=>s+Number(l.repaid),0)],
  ];
  const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
  wsSummary['!cols'] = [{wch:38},{wch:20}];
  XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

  // ── SHEET 2: Monthly Dues ─────────────────────────────────
  const duesHeaders = ['SN','Member ID','Member Name','Payment Type','Month / Period','Amount (Rs)','Date (BS)','Payment Mode','Note'];
  const duesRows = filteredDues
    .filter(d=>d.type!=='loan_repayment')
    .sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')))
    .map((d,i)=>[
      i+1,
      d.memberId||'—',
      d.memberName||getMember(d.memberId)?.fullname||'—',
      d.type==='monthly'?'Monthly Dues':d.type==='initial'?'Initial Deposit':d.type==='special'?'Special/Event':d.type||'Other',
      d.month||'—',
      Number(d.amount)||0,
      d.date||'—',
      d.paymode||'—',
      d.note||'—'
    ]);
  const duesTotalRow = ['','','','','TOTAL', filteredDues.filter(d=>d.type!=='loan_repayment').reduce((s,d)=>s+Number(d.amount),0),'','',''];
  const wsDues = XLSX.utils.aoa_to_sheet([duesHeaders, ...duesRows, [], duesTotalRow]);
  wsDues['!cols'] = [{wch:5},{wch:12},{wch:22},{wch:18},{wch:22},{wch:14},{wch:14},{wch:16},{wch:20}];
  XLSX.utils.book_append_sheet(wb, wsDues, 'Dues Collection');

  // ── SHEET 3: Loan Repayments ──────────────────────────────
  const repHeaders = ['SN','Member ID','Member Name','Loan ID','Amount Paid (Rs)','Date (BS)','Payment Mode','Note'];
  const repRows = filteredRepayments
    .sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')))
    .map((d,i)=>[
      i+1,
      d.memberId||'—',
      d.memberName||getMember(d.memberId)?.fullname||'—',
      d.loanId||'—',
      Number(d.amount)||0,
      d.date||'—',
      d.paymode||'—',
      d.note||'—'
    ]);
  const repTotalRow = ['','','','TOTAL', filteredRepayments.reduce((s,d)=>s+Number(d.amount),0),'','',''];
  const wsRep = XLSX.utils.aoa_to_sheet([repHeaders, ...repRows, [], repTotalRow]);
  wsRep['!cols'] = [{wch:5},{wch:12},{wch:22},{wch:14},{wch:16},{wch:14},{wch:16},{wch:22}];
  XLSX.utils.book_append_sheet(wb, wsRep, 'Loan Repayments');

  // ── SHEET 4: Expenses ─────────────────────────────────────
  const expHeaders = ['SN','Category','Description','Paid To','Amount (Rs)','Date (BS)'];
  const expRows = filteredExpenses
    .sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')))
    .map((e,i)=>[
      i+1,
      e.category||'—',
      e.description||'—',
      e.paidTo||'—',
      Number(e.amount)||0,
      e.date||'—'
    ]);
  const expTotalRow = ['','','','TOTAL', filteredExpenses.reduce((s,e)=>s+Number(e.amount),0),''];
  const wsExp = XLSX.utils.aoa_to_sheet([expHeaders, ...expRows, [], expTotalRow]);
  wsExp['!cols'] = [{wch:5},{wch:20},{wch:30},{wch:20},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsExp, 'Expenses');

  // ── SHEET 5: Member-wise Breakdown ────────────────────────
  const memHeaders = ['SN','Member ID','Member Name','Initial Deposit','Monthly Dues','Special','Loan Repayment','Total Paid','Active Loans','Loan Outstanding'];
  const memRows = verifiedMembers.map((m,i)=>{
    const mId = String(m.memberid||m.id);
    const mDues = filteredDues.filter(d=>String(d.memberId)===mId||String(d.memberId)===String(m.id));
    const mRep  = filteredRepayments.filter(d=>String(d.memberId)===mId||String(d.memberId)===String(m.id));
    const initial  = mDues.filter(d=>d.type==='initial').reduce((s,d)=>s+Number(d.amount),0);
    const monthly  = mDues.filter(d=>d.type==='monthly').reduce((s,d)=>s+Number(d.amount),0);
    const special  = mDues.filter(d=>d.type==='special').reduce((s,d)=>s+Number(d.amount),0);
    const repaid   = mRep.reduce((s,d)=>s+Number(d.amount),0);
    const myLoans  = APP.loans.filter(l=>String(l.memberId)===mId||String(l.memberId)===String(m.id));
    const outstanding = myLoans.reduce((s,l)=>s+Math.max(0,(Number(l.totalPayable)||calcLoan(l.amount,l.rate,l.months).totalPayable)-Number(l.repaid)),0);
    return [i+1, m.memberid||'—', m.fullname, initial, monthly, special, repaid, initial+monthly+special+repaid, myLoans.filter(l=>l.status==='active').length, outstanding];
  });
  const memTotalRow = [
    '','','TOTAL',
    memRows.reduce((s,r)=>s+r[3],0),
    memRows.reduce((s,r)=>s+r[4],0),
    memRows.reduce((s,r)=>s+r[5],0),
    memRows.reduce((s,r)=>s+r[6],0),
    memRows.reduce((s,r)=>s+r[7],0),
    '',
    memRows.reduce((s,r)=>s+r[9],0)
  ];
  const wsMem = XLSX.utils.aoa_to_sheet([memHeaders, ...memRows, [], memTotalRow]);
  wsMem['!cols'] = [{wch:5},{wch:12},{wch:22},{wch:16},{wch:16},{wch:14},{wch:18},{wch:14},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb, wsMem, 'Member Breakdown');

  // ── Download ──────────────────────────────────────────────
  const fileName = `HatemaloSamuha_Report_${label}.xlsx`;
  XLSX.writeFile(wb, fileName);

  hideLoader();
  document.getElementById('profile-modal-bg').classList.remove('open');
}

async function sendSingleEmailReminder(memberId,month,year){
  const m=getMember(memberId);if(!m||!m.email){alert('No email address saved for this member.');return;}
  const mId=String(m.memberid||m.id);

  // read checkboxes — same as buildWAMessage
  const includeDues=document.getElementById('wa-dues-'+mId)?.checked;
  const activeLoans=APP.loans.filter(l=>(String(l.memberId)===mId||String(l.memberId)===String(m.id))&&l.status==='active');
  const includedLoans=activeLoans.filter(l=>document.getElementById('wa-loan-'+l.id)?.checked);

  if(!includeDues&&includedLoans.length===0){alert('Please select at least one item to include in the reminder.');return;}
  if(!confirm(`Send reminder email to ${m.fullname} (${m.email})?`))return;

  // build loan rows for email
  const loanRows=includedLoans.map(l=>{
    const calc=calcLoan(l.amount,l.rate,l.months);
    const monthly=Number(l.monthlyInstallment)||calc.monthlyInstallment;
    const totalPayable=Number(l.totalPayable)||calc.totalPayable;
    const repaid=Number(l.repaid)||0;
    const remaining=Math.max(0,totalPayable-repaid);
    const installmentsDone=APP.dues.filter(d=>(String(d.memberId)===mId||String(d.memberId)===String(m.id))&&d.type==='loan_repayment'&&String(d.loanId)===String(l.id)).length;
    return{
      installmentNo:installmentsDone+1,
      monthly,remaining,
      rate:l.rate,months:l.months,
      issued:fmtDate(l.issued),
      totalPayable,repaid
    };
  });

  const totalDue=(includeDues?MONTHLY_DUES:0)+includedLoans.reduce((s,l)=>{
    const calc=calcLoan(l.amount,l.rate,l.months);
    return s+(Number(l.monthlyInstallment)||calc.monthlyInstallment);
  },0);

  showLoader('Sending email...');
  try{
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({
      action:'sendDuesReminder',
      to:m.email,
      name:m.fullname,
      memberId:m.memberid||m.id,
      month,year,
      includeDues:!!includeDues,
      duesAmount:MONTHLY_DUES,
      loans:loanRows,
      totalDue,
      website:'https://hatemalosamuha.vercel.app'
    })});
    hideLoader();
    alert(`✅ Reminder email sent to ${m.fullname}!`);
  }catch(e){hideLoader();alert('Failed to send email. Check your connection.');}
}

  const unpaid=memberSort(APP.members.filter(m=>m.status==='verified'&&!paid.has(String(m.memberid||m.id))));
  const withEmail=unpaid.filter(m=>m.email);
  if(withEmail.length===0){alert('No unpaid members with email addresses found.');return;}
  if(!confirm(`Send dues reminder emails to ${withEmail.length} member(s)?\n\n${withEmail.map(m=>m.fullname).join(', ')}`))return;
  showLoader(`Sending ${withEmail.length} emails...`);
  let sent=0;

        memberId:m.memberid||m.id,

function buildWAMessage(memberId,month,year){
  const m=getMember(memberId);if(!m)return'';
  const mId=String(m.memberid||m.id);

  const includeDues=document.getElementById('wa-dues-'+mId)?.checked;
  const activeLoans=APP.loans.filter(l=>(String(l.memberId)===mId||String(l.memberId)===String(m.id))&&l.status==='active');

  let lines=[];
  lines.push(`नमस्ते ${m.fullname} जी! 🙏`);
  lines.push(`रातमाटा हातेमालो समुहको तर्फबाट निम्न रकम बुझाउन बाँकी रहेको जानकारी गराउँछौं:\n`);

  let total=0;

  if(includeDues){
    lines.push(`💰 मासिक बचत — ${month} ${year}`);
    lines.push(`   रकम: Rs ${MONTHLY_DUES.toLocaleString()}`);
    total+=MONTHLY_DUES;
  }

  activeLoans.forEach(l=>{
    const includeThisLoan=document.getElementById('wa-loan-'+l.id)?.checked;
    if(!includeThisLoan)return;
    const calc=calcLoan(l.amount,l.rate,l.months);
    const monthly=Number(l.monthlyInstallment)||calc.monthlyInstallment;
    const totalPayable=Number(l.totalPayable)||calc.totalPayable;
    const repaid=Number(l.repaid)||0;
    const remaining=Math.max(0,totalPayable-repaid);
    const installmentsDone=APP.dues.filter(d=>(String(d.memberId)===mId||String(d.memberId)===String(m.id))&&d.type==='loan_repayment'&&String(d.loanId)===String(l.id)).length;
    lines.push(`\n📋 ऋण किस्ता #${installmentsDone+1}`);
    lines.push(`   मासिक किस्ता: Rs ${monthly.toLocaleString()}`);
    lines.push(`   बाँकी जम्मा: Rs ${remaining.toLocaleString()}`);
    lines.push(`   अवधि: ${l.months} महिना | दर: ${l.rate}%/वर्ष`);
    total+=monthly;
  });

  if(total>0){
    lines.push(`\n💵 यस पटक तिर्नु पर्ने जम्मा: Rs ${total.toLocaleString()}`);
  }

  lines.push(`\nकृपया आगामी बैठकसम्म बुझाउनु होला।`);
  lines.push(`धन्यवाद 🙏\nहातेमालो समुह`);

  return lines.join('\n');
}

function buildAndSendWA(memberId,month,year){
  const m=getMember(memberId);if(!m)return;
  const msg=buildWAMessage(memberId,month,year);
  if(!msg){alert('Please select at least one item to include.');return;}

  // show preview
  const mId=String(m.memberid||m.id);
  const preview=document.getElementById('wa-preview-'+mId);
  const previewText=document.getElementById('wa-preview-text-'+mId);
  if(preview&&previewText){preview.style.display='block';previewText.textContent=msg;}

  const ph=String(m.phone||'').trim().replace(/[\s\-\(\)]/g,'');
  const intl=ph.startsWith('977')?ph:ph.startsWith('0')?'977'+ph.slice(1):ph?'977'+ph:'';
  if(!intl){alert('No phone number saved for this member. Use Copy instead.');return;}
  const waUrl='https://api.whatsapp.com/send?phone='+intl+'&text='+encodeURIComponent(msg);
  window.open(waUrl,'_blank');
}

function buildAndCopyWA(memberId,month,year){
  const m=getMember(memberId);if(!m)return;
  const msg=buildWAMessage(memberId,month,year);
  if(!msg){alert('Please select at least one item to include.');return;}

  // show preview
  const mId=String(m.memberid||m.id);
  const preview=document.getElementById('wa-preview-'+mId);
  const previewText=document.getElementById('wa-preview-text-'+mId);

}

async function approvePayment(payId){
  const p=(APP.paymentRequests||[]).find(x=>String(x.id)===String(payId));
  if(!p)return;
  const mem=getMember(p.memberId);

  // read corrected values from admin inputs
  const correctedAmount=Number(document.getElementById('admin-amount-'+payId)?.value||p.amount);
  const correctedDate=document.getElementById('admin-date-'+payId)?.value.trim()||p.date||todayBS();
  const adminNote=document.getElementById('admin-note-'+payId)?.value.trim()||'';
  const wasAmountCorrected=correctedAmount!==Number(p.amount);

  if(!correctedAmount||correctedAmount<=0){
    alert('Please enter a valid amount before approving.');
    document.getElementById('admin-amount-'+payId)?.focus();
    return;
  }

  const confirmMsg=wasAmountCorrected
    ?`Approve payment from ${p.memberName}?\n\n⚠️ AMOUNT CORRECTED:\nSubmitted: ${fmt(p.amount)}\nApproved: ${fmt(correctedAmount)}\n\nThe corrected amount will be recorded.`
    :`Approve payment of ${fmt(correctedAmount)} from ${p.memberName}?\n\nThis will auto-record it in the Dues sheet.`;
  if(!confirm(confirmMsg))return;

  showLoader('Approving and recording payment...');

  // build note — include correction info if amount was changed
  const correctionNote=wasAmountCorrected
    ?`Amount corrected from Rs ${Number(p.amount).toLocaleString()} to Rs ${correctedAmount.toLocaleString()} by admin`:'';
  const fullNote=[
    'Payment verified',
    p.txnId?'Ref: '+p.txnId:'',
    correctionNote,
    adminNote
  ].filter(Boolean).join(' | ');

  // update payment request
  p.status='approved';
  p.approvedOn=todayBS();
  p.adminNote=adminNote;
  p.correctedAmount=correctedAmount;
  p.correctedDate=correctedDate;
  await updateSheet('PaymentRequests',payId,{
    status:'approved',
    approvedOn:todayBS(),
    adminNote,
    correctedAmount,
    correctedDate
  });

  // ── Duplicate check before recording ─────────────────
  if(p.type==='monthly'||p.type==='initial'){
    const dup=checkDuplicateDue(mem?.memberid||p.memberId, p.type, p.month, p.year);
    if(dup){
      hideLoader();
      const proceed=await adminAlert(
        '⚠️',
        'Duplicate Detected',
        `<strong>${p.memberName}</strong> already has a `+
        `<strong>${p.type==='monthly'?'monthly dues':'initial deposit'}</strong> record for `+
        `<strong>${p.month} ${p.year}</strong>.<br><br>`+
        `<div style="background:#fef3c7;border-radius:8px;padding:12px;text-align:left;font-size:12px;margin-bottom:6px">`+
        `Amount: <strong>${fmt(dup.amount)}</strong><br>`+
        `Date: <strong>${fmtDate(dup.date)}</strong><br>`+
        `Mode: <strong>${dup.paymode||'—'}</strong></div>`+
        `This may be a duplicate submission. Approve anyway?`,
        [{label:'Reject as Duplicate',value:false,primary:false},{label:'Approve Anyway',value:true,primary:true}]
      );
      if(!proceed){
        // mark as rejected with duplicate reason
        p.status='rejected';p.rejectReason='Duplicate — already recorded for '+p.month+' '+p.year;
        await updateSheet('PaymentRequests',payId,{status:'rejected',rejectReason:p.rejectReason,rejectedOn:todayBS()});
        addNotification('❌ Payment Rejected',`Your payment for ${p.month} ${p.year} was not recorded — a payment already exists for this period.`,'warning','❌',mem?.memberid||p.memberId);
        await loadAllData('Refreshing...');
        updateBadges();
        renderPaymentVerify(document.getElementById('admin-main'));
        return;
      }
      showLoader('Recording duplicate-confirmed payment...');
    }
  }

  // auto-record in Dues with corrected amount
  const newDue={
    id:Date.now()+Math.floor(Math.random()*1000),
    memberId:mem?.memberid||p.memberId,
    memberName:mem?.fullname||p.memberName||'',

    year:p.year||correctedDate.split('-')[0]||todayBS().split('-')[0],
    month:p.month||'',
    amount:correctedAmount,
    date:correctedDate,
    status:'paid',
    paymode:p.paymode||'Cash',
    type:p.type||'monthly',
    note:fullNote,
    loanId:p.loanId||''
  };
  APP.dues.push(newDue);
  await saveToSheet('Dues',newDue);

  // if loan repayment update loan balance with corrected amount
  if(p.type==='loan_repayment'&&p.loanId){
    const loan=APP.loans.find(l=>String(l.id)===String(p.loanId));
    if(loan){
      const calc=calcLoan(loan.amount,loan.rate,loan.months);
      const totalPayable=Number(loan.totalPayable)||calc.totalPayable;
      const newRepaid=Math.min(Number(loan.repaid||0)+correctedAmount,totalPayable);
      loan.repaid=newRepaid;
      loan.status=newRepaid>=totalPayable?'settled':'active';
      await updateSheet('Loans',loan.id,{repaid:newRepaid,status:loan.status});
      const lrCalc=calcLoan(loan.amount,loan.rate,loan.months);
      const lrTotalPay=Number(loan.totalPayable)||lrCalc.totalPayable;
      const lrInterestT=Number(loan.interest)||lrCalc.interest;
      const lrIntPortion=Math.round(lrInterestT*(correctedAmount/lrTotalPay));
      const lrRecord={
        id:Date.now()+Math.floor(Math.random()*999),
        loanId:loan.id,
        memberId:mem?.memberid||p.memberId,
        memberName:mem?.fullname||p.memberName||'',
        amount:correctedAmount,
        interest:lrIntPortion,
        principal:correctedAmount-lrIntPortion,
        date:correctedDate,
        status:'paid',
        note:fullNote
      };
      await saveToSheet('LoanRepayments',lrRecord);
    }
  }

  // notify member — mention correction if amount changed
  const notifBody=wasAmountCorrected
    ?`Your payment of ${fmt(p.amount)} was approved with a correction — recorded as ${fmt(correctedAmount)} for ${p.month||''} ${p.year||''}.${adminNote?' Note: '+adminNote:''}`
    :`Your payment of ${fmt(correctedAmount)} for ${p.month||''} ${p.year||''} via ${p.paymode} has been verified and recorded.${adminNote?' Note: '+adminNote:''}`;

  addNotification(
    wasAmountCorrected?'✅ Payment Approved (Amount Corrected)':'✅ Payment Approved',
    notifBody,
    'success','✅',mem?.memberid||p.memberId
  );

  await loadAllData('Refreshing...');
  updateBadges();
  hideLoader();
  renderPaymentVerify(document.getElementById('admin-main'));
  alert(`✅ Payment approved and recorded!\n\nMember: ${p.memberName}\nRecorded Amount: ${fmt(correctedAmount)}${wasAmountCorrected?' (corrected from '+fmt(p.amount)+')':''}\nDate: ${correctedDate}\nType: ${p.type}`);
}

async function rejectPayment(payId){
  const p=(APP.paymentRequests||[]).find(x=>String(x.id)===String(payId));
  if(!p)return;
  const mem=getMember(p.memberId);
  const adminNote=document.getElementById('admin-note-'+payId)?.value.trim();
  const reason=adminNote||prompt(`Reason for rejecting ${p.memberName}'s payment:`,'Receipt unclear or amount mismatch');
  if(reason===null)return;
  showLoader('Rejecting...');
  p.status='rejected';p.rejectReason=reason;p.rejectedOn=todayBS();
  await updateSheet('PaymentRequests',payId,{status:'rejected',rejectReason:reason,rejectedOn:todayBS()});
  addNotification(
    '❌ Payment Rejected',
    `Your payment submission of ${fmt(p.amount)} was not approved. Reason: ${reason}. Please resubmit with a clear screenshot.`,
    'warning','❌',mem?.memberid||p.memberId
  );
  await loadAllData('Refreshing...');
  updateBadges();
  hideLoader();
  renderPaymentVerify(document.getElementById('admin-main'));
}
function checkAmountChange(payId, originalAmount){
  const input=document.getElementById('admin-amount-'+payId);
  const warning=document.getElementById('amount-warning-'+payId);
  if(!input||!warning)return;
  const newAmount=Number(input.value);
  warning.style.display=(newAmount!==Number(originalAmount)&&newAmount>0)?'block':'none';
}
function checkDuplicateDue(memberId, type, month, year){
  if(type!=='monthly'&&type!=='initial')return null;
  const mId=String(memberId);
  const existing=APP.dues.find(d=>
    (String(d.memberId)===mId)&&
    d.status==='paid'&&
    d.type===type&&
    String(d.month||'').trim()===String(month||'').trim()&&
    String(d.year||d.date?.split('-')[0]||'')===String(year||'')
  );
  return existing||null;
}
// ── CUSTOM ALERT / CONFIRM MODAL ─────────────────────────
function adminAlert(icon, title, body, buttons){
  return new Promise(resolve=>{
    const bg=document.getElementById('admin-alert-bg');
    document.getElementById('admin-alert-icon').textContent=icon;
    document.getElementById('admin-alert-title').textContent=title;
    document.getElementById('admin-alert-body').innerHTML=body;
    const btnsEl=document.getElementById('admin-alert-btns');
    btnsEl.innerHTML='';
    buttons.forEach(btn=>{
      const b=document.createElement('button');
      b.textContent=btn.label;
      b.style.cssText=`padding:10px 28px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;${btn.primary?'background:var(--primary);color:white;':'background:#f3f4f6;color:var(--text);border:1px solid var(--border);'}`;
      b.onclick=()=>{bg.style.display='none';resolve(btn.value);};
      btnsEl.appendChild(b);
    });
    bg.style.display='flex';
  });
}
