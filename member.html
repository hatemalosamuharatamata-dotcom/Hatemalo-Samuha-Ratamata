<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — Hatemalo Samuha</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#003366;--secondary:#cc0000;--light:#f4f7f6;--accent:#fbbf24;
  --white:#ffffff;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--success:#16a34a;
}
body{font-family:'Poppins',sans-serif;background:var(--light);color:var(--text)}
.hidden{display:none!important}
@keyframes spin{to{transform:rotate(360deg)}}

/* NAVBAR */
.navbar{background:var(--primary);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{width:42px;height:42px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--primary)}
.nav-title h1{font-size:15px;font-weight:700;color:white;line-height:1.2}
.nav-title p{font-size:11px;color:rgba(255,255,255,0.65)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-link{padding:6px 14px;color:rgba(255,255,255,0.8);border:none;background:transparent;cursor:pointer;font-size:13px;border-radius:6px;text-decoration:none}
.nav-link:hover{background:rgba(255,255,255,0.12);color:white}
.notif-wrap{position:relative;cursor:pointer;padding:6px 8px;border-radius:6px}
.notif-wrap:hover{background:rgba(255,255,255,0.1)}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--secondary);display:none}
.btn-logout{padding:6px 14px;background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);border-radius:6px;cursor:pointer;font-size:12px}

/* LAYOUT */
.member-layout{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 60px)}
.member-sidebar{background:var(--primary);padding:0}
.mem-sb-top{padding:24px 16px;border-bottom:1px solid rgba(255,255,255,0.1);text-align:center}
.mem-av-lg{width:72px;height:72px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--primary);margin:0 auto 12px;border:3px solid rgba(255,255,255,0.3);overflow:hidden}
.sb-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:0.08em;padding:10px 16px 4px;text-transform:uppercase}
.msb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;background:transparent;border:none;color:rgba(255,255,255,0.75);cursor:pointer;font-size:12px;text-align:left}
.msb-btn:hover{background:rgba(255,255,255,0.08);color:white}
.msb-btn.active{background:rgba(255,255,255,0.16);color:white;font-weight:700;border-left:3px solid var(--accent)}
.msb-btn .ic{font-size:14px;width:18px;text-align:center}
.bc{background:var(--secondary);color:white;font-size:10px;padding:1px 6px;border-radius:10px;margin-left:auto}
.main-panel{padding:22px;background:var(--light);overflow-y:auto;min-height:calc(100vh - 60px)}

/* CARDS */
.ph{margin-bottom:18px}
.ph h2{font-size:19px;font-weight:700;color:var(--primary)}
.ph p{font-size:12px;color:var(--muted);margin-top:3px}
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:700;color:var(--primary);margin-bottom:14px}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.sc2{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:14px}
.sc2-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.sc2-val{font-size:20px;font-weight:700;color:var(--primary)}
.sc2-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:9px 10px;background:#f8fafc;font-weight:700;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)}
.tbl td{padding:10px 10px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}

/* FORMS */
.frow{margin-bottom:14px}
.frow label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px}
.frow input,.frow select,.frow textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:var(--white)}
.frow input:focus,.frow select:focus,.frow textarea:focus{outline:none;border-color:var(--primary)}
.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* LOAN FORM */
.loan-form-wrap{background:#fffbf0;border:1px solid #fde68a;border-radius:12px;padding:28px}
.lf-blank{border:none;border-bottom:1px solid #555;background:transparent;font-size:13px;color:var(--primary);min-width:80px;padding:0 4px}
.lf-blank:focus{outline:none;border-bottom-color:var(--primary)}
.lf-body{font-size:13px;line-height:2.4;color:#1a1a1a;margin-bottom:22px}

/* BUTTONS */
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-p{background:var(--primary);color:white}.btn-p:hover{background:#002244}
.btn-s{background:var(--secondary);color:white}.btn-s:hover{background:#a80000}
.btn-o{background:transparent;color:var(--primary);border:2px solid var(--primary)}
.btn-full{width:100%}
.fr{display:flex;align-items:center;gap:8px}

/* BADGES & ALERTS */
.badge{font-size:10px;padding:2px 9px;border-radius:20px;font-weight:600}
.bv{background:#dcfce7;color:#166534}.bp{background:#fef3c7;color:#92400e}
.br{background:#fee2e2;color:#991b1b}.bb{background:#dbeafe;color:#1e40af}.ba{background:#fef9c3;color:#854d0e}
.alert{font-size:12px;padding:10px 14px;border-radius:8px;margin-bottom:14px;border:1px solid transparent}
.alert-s{background:#dcfce7;color:#166534;border-color:#86efac}
.alert-i{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.alert-w{background:#fef3c7;color:#92400e;border-color:#fde68a}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-row{padding:10px;background:var(--light);border-radius:8px}
.info-label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.info-val{font-size:12px;font-weight:600;margin-top:3px}

/* CHART */
.chart-wrap{position:relative;width:100%;height:220px}

/* LOADER */
.loader-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,60,0.35);z-index:500;align-items:center;justify-content:center}
.loader-overlay.open{display:flex}
.loader-box{background:white;border-radius:14px;padding:32px 40px;text-align:center}
.loader-spin{width:40px;height:40px;border:4px solid var(--light);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
.loader-box p{font-size:13px;color:var(--muted)}

/* NOTIFICATION PANEL */
.notif-panel{position:fixed;top:60px;right:0;width:330px;background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;z-index:250;box-shadow:0 10px 30px rgba(0,0,0,0.15);display:none;max-height:500px;overflow-y:auto}
.notif-panel.open{display:block}
.notif-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.notif-hdr h3{font-size:13px;font-weight:700;color:var(--primary)}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.notif-item:hover{background:var(--light)}
.notif-item.unread{background:#eff6ff}

@media(max-width:768px){
  .member-layout{grid-template-columns:1fr}
  .member-sidebar{display:none}
  .sg3{grid-template-columns:1fr 1fr}
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-box"><div class="loader-spin"></div><p id="loader-msg">Loading...</p></div>
</div>

<div class="notif-panel" id="notif-panel">
  <div class="notif-hdr"><h3>Notifications</h3><button onclick="markAllRead()" style="font-size:11px;color:var(--primary);background:none;border:none;cursor:pointer">Mark all read</button></div>
  <div id="notif-list"></div>
</div>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">H</div>
    <div class="nav-title"><h1>Hatemalo Samuha</h1><p>हातेमालो समुह — Member Dashboard</p></div>
  </div>
  <div class="nav-right">
    <a href="index.html" class="nav-link">Home</a>
    <span id="nav-username" style="font-size:12px;color:rgba(255,255,255,0.8)"></span>
    <div class="notif-wrap" id="notif-wrap" onclick="toggleNotif()">
      <svg width="18" height="18" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24"><path d="M15 17H20L18.6 15.6A1 1 0 0118 14.8V11a6 6 0 10-12 0v3.8a1 1 0 01-.6.8L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <div class="notif-dot" id="notif-dot"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</nav>

<div class="member-layout">
  <div class="member-sidebar">
    <div class="mem-sb-top">
      <div class="mem-av-lg" id="mem-av">?</div>
      <div style="font-size:14px;font-weight:700;color:white" id="mem-name-sb">Member</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px" id="mem-role-sb">—</div>
      <span class="badge bv" style="margin-top:8px;display:inline-block">Verified</span>
    </div>
    <div style="padding:10px 0">
      <div class="sb-label">My Account</div>
      <button class="msb-btn active" onclick="memberTab('overview',this)"><span class="ic">🏠</span>Overview</button>
      <button class="msb-btn" onclick="memberTab('my-funds',this)"><span class="ic">💰</span>My Funds</button>
      <button class="msb-btn" onclick="memberTab('my-loans',this)"><span class="ic">📋</span>My Loans</button>
      <button class="msb-btn" onclick="memberTab('apply-loan',this)"><span class="ic">📝</span>Apply for Loan</button>
      <button class="msb-btn" onclick="memberTab('pay-dues',this)"><span class="ic">💳</span>Pay Dues<span class="bc" id="pay-status-bc"></span></button>
      <button class="msb-btn" onclick="memberTab('profile',this)"><span class="ic">👤</span>My Profile</button>
      <div class="sb-label">Group</div>
      <button class="msb-btn" onclick="memberTab('group-finance',this)"><span class="ic">📊</span>Group Finance</button>
<button class="msb-btn" onclick="memberTab('meetings',this)"><span class="ic">📅</span>Meetings</button>
<button class="msb-btn" onclick="memberTab('notifications',this)"><span class="ic">🔔</span>Notifications<span class="bc" id="mem-notif-bc">0</span></button>

    </div>
  </div>
<div class="main-panel" id="member-main"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8Lcwa0h_tDLFBWkEKMfOn8hAdJ_5gn9nUzHpuBgruBEYKpdYXB9Vf6fVltk0bvvCi/exec';

let APP = {currentUser:null,members:[],dues:[],loans:[],expenses:[],notifications:[],loanRequests:[],meetings:[],loanRepayments:[],paymentRequests:[],profileRequests:[]};
let CHARTS = {};
// ── NOTIFICATION READ STATE (persisted in localStorage) ──
function _notifKey(){
  return 'hs_read_notifs_' + (APP.currentUser?.memberid || APP.currentUser?.id || 'guest');
}
function getReadIds(){
  try{ return new Set(JSON.parse(localStorage.getItem(_notifKey())||'[]')); }
  catch(e){ return new Set(); }
}
function markIdRead(id){
  const ids = getReadIds();
  ids.add(String(id));
  localStorage.setItem(_notifKey(), JSON.stringify([...ids]));
}
function markAllIdsRead(){
  const ids = APP.notifications.map(n=>String(n.id));
  localStorage.setItem(_notifKey(), JSON.stringify(ids));
}
function isRead(n){
  return getReadIds().has(String(n.id));
}

function calcLoan(amount, rate, months){
  const principal   = Number(amount);
  const interest    = Math.round(principal * (Number(rate)/100) * (Number(months)/12));
  const totalPayable = principal + interest;
  const monthlyInstallment = Math.round(totalPayable / Number(months));
  return { principal, interest, totalPayable, monthlyInstallment };
} 
function cleanNum(v){
  if(v===null||v===undefined)return 0;
  return Number(String(v).replace(/,/g,''))||0;
}

// ── AUTH CHECK ────────────────────────────────────────────
const _savedRole = localStorage.getItem('hs_role');
const _savedUser = localStorage.getItem('hs_user');
if(_savedRole !== 'member' || !_savedUser){
  window.location.href = 'index.html';
}

// ── HELPERS ──────────────────────────────────────────────
const fmt = n => 'Rs ' + Number(n||0).toLocaleString();
const ini = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const today = () => todayBS();
function adToBs(dateStr){
  if(!dateStr)return'—';
  const str=String(dateStr).split('T')[0].trim();
  if(!str||str==='—'||str==='undefined')return'—';
  const parts=str.split('-');
  if(parts.length!==3)return str;
  const year=parseInt(parts[0]),mon=parseInt(parts[1]),day=parseInt(parts[2]);
  if(year>2050){if(mon<1||mon>12||day<1||day>32)return'—';return str;}
  const adDate=new Date(year,mon-1,day);
  if(isNaN(adDate.getTime()))return'—';
  const bsData={
    2019:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2020:[[4,13],[5,15],[6,14],[7,16],[8,17],[9,17],[10,17],[11,16],[12,15],[1,15],[2,13],[3,13]],
    2021:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2022:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2023:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,18],[11,17],[12,16],[1,15],[2,13],[3,14]],
    2024:[[4,13],[5,14],[6,14],[7,16],[8,16],[9,16],[10,17],[11,16],[12,15],[1,14],[2,13],[3,13]],
    2025:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,17],[11,16],[12,16],[1,14],[2,12],[3,14]],
    2026:[[4,14],[5,15],[6,15],[7,17],[8,17],[9,17],[10,17],[11,16],[12,16],[1,14],[2,12],[3,14]],
  };
  for(const checkAdYear of[year,year-1]){
    const entry=bsData[checkAdYear];if(!entry)continue;
    const bsYear=checkAdYear+57;
    for(let bsMonth=12;bsMonth>=1;bsMonth--){
      const[startAdMon,startAdDay]=entry[bsMonth-1];
      let startYear=checkAdYear;
      if(bsMonth>=10)startYear=checkAdYear+1;
      const startDate=new Date(startYear,startAdMon-1,startAdDay);
      if(adDate>=startDate){
        const bsDay=Math.floor((adDate-startDate)/86400000)+1;
        return`${bsYear}-${String(bsMonth).padStart(2,'0')}-${String(bsDay).padStart(2,'0')}`;
      }
    }
  }
  return`${year+56}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}
function todayBS(){
  const ad=new Date();
  const y=ad.getFullYear(),m=String(ad.getMonth()+1).padStart(2,'0'),d=String(ad.getDate()).padStart(2,'0');
  const result=adToBs(`${y}-${m}-${d}`);
  if(!result||result==='—')return`${y+56}-${m}-${d}`;
  return result;
}
function fmtDate(d){
  if(!d)return'—';
  const str=String(d).split('T')[0].trim();
  if(!str||str==='undefined'||str==='null')return'—';
  return adToBs(str);
}
// REPLACE WITH:
function showLoader(msg='Loading...'){
  document.getElementById('loader-msg').textContent=msg;
  document.getElementById('loader').classList.add('open');
}
function hideLoader(){document.getElementById('loader').classList.remove('open');}
function destroyChart(id){if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}}

// ── API ───────────────────────────────────────────────────
async function apiCall(action,sheet,data={}){
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 15000);
    const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action,sheet,...data}),signal:controller.signal});
    clearTimeout(timeout);
    return await res.json();
  }catch(e){return {error:e.message};}
}
async function loadAllData(){
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 12000);
    const res=await fetch(`${SCRIPT_URL}?action=getAllSheets`,{signal:controller.signal});
    clearTimeout(timeout);
    const data=await res.json();
    if(data.members) APP.members=data.members;
    if(data.dues) APP.dues=data.dues;
    if(data.loans) APP.loans=data.loans;
    if(data.notifications) APP.notifications=data.notifications;
    const fresh=APP.members.find(m=>
  String(m.id)===String(APP.currentUser.id) ||
  String(m.memberid)===String(APP.currentUser.memberid)
);
if(data.loanRequests) APP.loanRequests=data.loanRequests;
    if(data.profileRequests) APP.profileRequests=data.profileRequests;
    if(data.paymentRequests) APP.paymentRequests=data.paymentRequests;
if(data.meetings) APP.meetings=data.meetings;
if(data.expenses) APP.expenses=data.expenses;
if(data.loanRepayments) APP.loanRepayments=data.loanRepayments;
    if(fresh) APP.currentUser=fresh;
}catch(e){
    console.warn('Data fetch failed or timed out, using cached data',e);
  }
}

async function saveToSheet(sheet,data){return await apiCall('insert',sheet,{data});}

// ── LOGOUT ────────────────────────────────────────────────
function doLogout(){
  localStorage.removeItem('hs_role');
  localStorage.removeItem('hs_user');
  window.location.href='index.html';
}

function getMyNotifications(){
  const m=APP.currentUser;
  const mId=String(m.memberid||m.id||'');
  return APP.notifications.filter(n=>{
    const nMember=String(n.memberid||n.memberId||'all').trim();

    // always show notices/announcements to everyone
    if(n.type==='notice') return true;

    // always show if explicitly addressed to this member
    if(nMember===mId) return true;

    // show group-wide notifications (memberid = 'all' or blank)
    if(nMember==='all'||nMember==='') return true;

    // show if it's about this member's own loan/dues/profile
    const body=String(n.body||'').toLowerCase();
    const title=String(n.title||'').toLowerCase();
    const mentionsMe=body.includes(mId.toLowerCase())||
                     title.includes(mId.toLowerCase())||
                     body.includes((m.fullname||'').toLowerCase())||
                     title.includes((m.fullname||'').toLowerCase());
    if(mentionsMe) return true;

    // hide admin-only notifications
    // these are about OTHER members — loan approvals, profile changes, verifications
    const adminOnly=[
      'account verified','account rejected','loan approved','loan rejected',
      'profile updated','profile request','payment record',
      'expense recorded','loan updated','loan deleted','dues reminder'
    ];
    const isAdminOnly=adminOnly.some(k=>title.includes(k)||body.includes(k));
    if(isAdminOnly&&nMember!==mId) return false;

    return false;
  }).slice().reverse();
}

function renderNotifPanel(){
  const myNotifs=getMyNotifications();
  const unread=myNotifs.filter(n=>!isRead(n)).length;
  document.getElementById('notif-dot').style.display=unread>0?'block':'none';
  document.getElementById('mem-notif-bc').textContent=unread||'';
  const colors={warning:'#fef3c7',loan:'#dbeafe',success:'#dcfce7',notice:'#ede9fe'};
  document.getElementById('notif-list').innerHTML=myNotifs.length===0
    ?'<div style="padding:16px;font-size:13px;color:var(--muted);text-align:center">No notifications yet.</div>'
    :myNotifs.map(n=>`
      <div class="notif-item ${!isRead(n)?'unread':''}" onclick="markNotifRead(${n.id})">
        <div style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:${colors[n.type]||'#ede9fe'}">${n.icon||'📢'}</div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">${n.title}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${n.body}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:4px">${n.time}</div>
        </div>
      </div>`).join('');
}


function toggleNotif(){document.getElementById('notif-panel').classList.toggle('open');}
function markNotifRead(id){
  markIdRead(id);
  renderNotifPanel();
}
function markAllRead(){
  markAllIdsRead();
  renderNotifPanel();
}
// ── MEMBER TABS ───────────────────────────────────────────
function memberTab(tab,btn){
  if(btn){document.querySelectorAll('.msb-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  localStorage.setItem('hs_member_tab',tab);
  Object.keys(CHARTS).forEach(k=>destroyChart(k));
  const el=document.getElementById('member-main');
  const m=APP.currentUser;
  const myDues=APP.dues.filter(d=>
  String(d.memberId)===String(m.id) ||
  String(d.memberId)===String(m.memberid)
);
const myLoans=APP.loans.filter(l=>
  String(l.memberId)===String(m.id) ||
  String(l.memberId)===String(m.memberid)
);
  if(tab==='overview') renderOverview(el,m,myDues,myLoans);
  else if(tab==='my-funds') renderFunds(el,m,myDues);
  else if(tab==='my-loans') renderLoans(el,m,myLoans);
  else if(tab==='apply-loan') renderApplyLoan(el,m);
  else if(tab==='notifications') renderNotifications(el);
  else if(tab==='profile') renderProfile(el,m);
  else if(tab==='pay-dues') renderPayDues(el,m);
  else if(tab==='group-finance') renderGroupFinance(el);
else if(tab==='meetings') renderMemberMeetings(el, APP.currentUser.memberid || APP.currentUser.id);
}

window.filterMemberDirectory=function(query){
  const q=query.toLowerCase().trim();
  const cards=document.querySelectorAll('.member-dir-card');
  let visible=0;
  cards.forEach(card=>{
    const name=card.getAttribute('data-name')||'';
    const id=card.getAttribute('data-id')||'';
    const match=!q||name.includes(q)||id.includes(q);
    card.style.display=match?'':'none';
    if(match)visible++;
  });
  const empty=document.getElementById('member-dir-empty');
  if(empty)empty.style.display=visible===0?'block':'none';
};

function renderFunds(el, m, myDues) {
  const monthly = myDues.filter(d=>d.status==='paid'&&d.type==='monthly').reduce((s,d)=>s+Number(d.amount),0);
  const special  = myDues.filter(d=>d.status==='paid'&&d.type==='special').reduce((s,d)=>s+Number(d.amount),0);
  const initial  = myDues.filter(d=>d.status==='paid'&&d.type==='initial').reduce((s,d)=>s+Number(d.amount),0);
  const total    = initial + monthly + special;

  // Sort newest first — assumes date field; fall back to array reverse
const sorted = myDues.slice().sort((a, b) => {
  const da = a.date ? String(a.date).trim() : '';
  const db = b.date ? String(b.date).trim() : '';
  if (!da && !db) return 0;
  if (!da) return 1;
  if (!db) return -1;
  return db.localeCompare(da);
});

  const PAGE_SIZE = 10;
  let currentPage = 1;

  function renderTable(page) {
    const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
    const start = (page - 1) * PAGE_SIZE;
    const slice = sorted.slice(start, start + PAGE_SIZE);

    const rows = slice.length === 0
      ? '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:16px">No payment records found.</td></tr>'

          <td>${d.month}</td>

            d.type==='special'?'Special':d.type==='initial'?'Initial':'Monthly'

          <td>${fmt(d.amount)}</td>
          <td>${fmtDate(d.date)}</td>
          <td><span class="badge ${d.status==='paid'?'bv':'bp'}">${d.status}</span></td>
        </tr>`).join('');

    const pagination = totalPages <= 1 ? '' : `
      <div style="display:flex;align-items:center;justify-content:space-between;
        padding:12px 10px;border-top:1px solid var(--border);font-size:12px;flex-wrap:wrap;gap:8px">
        <span style="color:var(--muted)">
          Showing ${start + 1}–${Math.min(start + PAGE_SIZE, sorted.length)} of ${sorted.length} records
        </span>
        <div style="display:flex;gap:6px;align-items:center">
          <button onclick="changeFundsPage(${page - 1})" ${page === 1 ? 'disabled' : ''}
            style="padding:4px 12px;border:1px solid var(--border);border-radius:6px;
              background:${page===1?'var(--light)':'white'};color:${page===1?'var(--muted)':'var(--primary)'};
              cursor:${page===1?'default':'pointer'};font-size:12px">← Prev</button>
          ${Array.from({length: totalPages}, (_, i) => i + 1).map(p => `
            <button onclick="changeFundsPage(${p})"
              style="padding:4px 10px;border:1px solid ${p===page?'var(--primary)':'var(--border)'};
                border-radius:6px;background:${p===page?'var(--primary)':'white'};
                color:${p===page?'white':'var(--text)'};cursor:pointer;font-size:12px;font-weight:${p===page?'700':'400'}">
              ${p}
            </button>`).join('')}
          <button onclick="changeFundsPage(${page + 1})" ${page === totalPages ? 'disabled' : ''}

function renderLoans(el,m,myLoans){
  const mId=String(m.memberid||m.id);
  el.innerHTML=`
    <div class="ph"><h2>My Loans</h2><p>Loan history and repayment details</p></div>

          const total     = Number(l.totalPayable)       || calc.totalPayable;
          const monthly   = Number(l.monthlyInstallment) || calc.monthlyInstallment;
          const interest  = Number(l.interest)           || calc.interest;
          const repaid    = Number(l.repaid)             || 0;
          const intPaid   = Number(l.interestPaid)       || 0;
          const remaining = total - repaid;
          const progress  = total > 0 ? Math.round((repaid/total)*100) : 0;
          return `
          <div class="card" style="margin-bottom:14px">
            <div class="card-title">
              ${l.purpose||l.loanType||'Loan'}
              <span class="badge ${l.status==='settled'?'bv':'bb'}">${l.status}</span>
            </div>

            <!-- SUMMARY ROW -->
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">
              <div style="background:#f0f4ff;border-radius:8px;padding:10px;text-align:center">
                <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px">PRINCIPAL</div>
                <div style="font-size:15px;font-weight:700;color:var(--primary)">${fmt(l.amount)}</div>
              </div>
              <div style="background:#fef9c3;border-radius:8px;padding:10px;text-align:center">
                <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px">INTEREST (${l.rate}%)</div>
                <div style="font-size:15px;font-weight:700;color:var(--warning)">${fmt(interest)}</div>
              </div>
              <div style="background:#f0fdf4;border-radius:8px;padding:10px;text-align:center">
                <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px">TOTAL PAYABLE</div>
                <div style="font-size:15px;font-weight:700;color:var(--success)">${fmt(total)}</div>
              </div>
              <div style="background:#fef2f2;border-radius:8px;padding:10px;text-align:center">
                <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px">REMAINING</div>
                <div style="font-size:15px;font-weight:700;color:${remaining>0?'var(--secondary)':'var(--success)'}">${fmt(remaining)}</div>
              </div>
            </div>

            <!-- DETAILS -->
            <div class="info-grid" style="margin-bottom:14px">
              <div class="info-row"><div class="info-label">Monthly Installment</div>
                <div class="info-val" style="color:var(--secondary);font-size:15px">${fmt(monthly)}/month</div>
              </div>
              <div class="info-row"><div class="info-label">Tenure</div>
                <div class="info-val">${l.months} months</div>
              </div>
              <div class="info-row"><div class="info-label">Total Repaid</div>
                <div class="info-val" style="color:var(--success)">${fmt(repaid)}</div>
              </div>
              <div class="info-row"><div class="info-label">Interest Paid</div>
                <div class="info-val" style="color:var(--warning)">${fmt(intPaid)}</div>
              </div>
              <div class="info-row"><div class="info-label">Date Issued</div>
                <div class="info-val">${fmtDate(l.issued)}</div>
              </div>
              <div class="info-row"><div class="info-label">Due Date</div>
                <div class="info-val">${fmtDate(l.due)||'—'}</div>
              </div>
            </div>
            <!-- PROGRESS BAR -->
            <div style="margin-bottom:14px">
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                <span>Repayment Progress</span>
                <span>${progress}%</span>
              </div>
              <div style="background:var(--border);border-radius:20px;height:8px;overflow:hidden">
                <div style="background:${progress>=100?'var(--success)':'var(--primary)'};height:100%;width:${progress}%;border-radius:20px;transition:width 0.3s"></div>
              </div>
            </div>

            <!-- REPAYMENT SCHEDULE -->
            ${(()=>{
              const repayments=APP.dues.filter(d=>(String(d.memberId)===mId||String(d.memberId)===String(m.id))&&d.type==='loan_repayment'&&String(d.loanId)===String(l.id)).sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
              const calc2=calcLoan(l.amount,l.rate,l.months);
              const totalP=Number(l.totalPayable)||calc2.totalPayable;
              const monthlyP=Number(l.monthlyInstallment)||calc2.monthlyInstallment;
              const intTotal=Number(l.interest)||calc2.interest;
              if(repayments.length===0&&l.status!=='active')return'';
              let runBal=totalP;
              const rows=repayments.map((r,i)=>{
                const amt=Number(r.amount);
                const intPortion=Math.round((intTotal/totalP)*amt);
                const prinPortion=amt-intPortion;
                runBal-=amt;
                return`<tr>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center">${i+1}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border)">${fmtDate(r.date)}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-weight:700;color:var(--success)">${fmt(amt)}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);color:var(--primary)">${fmt(prinPortion)}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);color:#d97706">${fmt(intPortion)}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-weight:700;color:${runBal<=0?'var(--success)':'var(--secondary)'}">${fmt(Math.max(0,runBal))}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border)"><span class="badge bv">paid</span></td>
                </tr>`;
              }).join('');
              const remaining2=l.months-repayments.length;
              const futureRows=l.status==='active'?Array.from({length:Math.min(remaining2,3)},(_,i)=>`
                <tr style="opacity:0.5">
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);text-align:center">${repayments.length+i+1}</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);color:var(--muted)">upcoming</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border);font-weight:700">${fmt(monthlyP)}</td>
                  <td colspan="3" style="padding:7px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-size:11px">—</td>
                  <td style="padding:7px 10px;border-bottom:1px solid var(--border)"><span class="badge bp">pending</span></td>
                </tr>`).join(''):'';
              return`
              <div style="margin-top:4px">
                <div style="font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">
                  Repayment History
                  <span style="font-size:11px;font-weight:400;color:var(--muted);margin-left:8px">${repayments.length} payment(s) recorded · ${remaining2} remaining</span>
                </div>
                ${repayments.length===0&&l.status==='active'?`<div class="alert alert-i" style="font-size:12px">No repayments recorded yet. First installment: ${fmt(monthlyP)}</div>`:`
                <div style="overflow-x:auto">
                  <table style="width:100%;border-collapse:collapse;font-size:12px">
                    <thead><tr style="background:#f8fafc">
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);text-align:center">#</th>
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Date</th>
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Amount</th>
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Principal</th>
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Interest</th>
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Balance</th>
                      <th style="padding:7px 10px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Status</th>
                    </tr></thead>
                    <tbody>${rows}${futureRows}</tbody>
                  </table>
                </div>
                ${remaining2>3&&l.status==='active'?`<div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">+ ${remaining2-3} more upcoming installments of ${fmt(monthlyP)} each</div>`:''}`}
              </div>`;
            })()}
          </div>`;
        }).join('')}`;
}

window.fillGuarantor = function(i){
  const sel        = document.getElementById('g'+i+'-select');
  const idInput    = document.getElementById('g'+i+'-memberid');
  const phoneInput = document.getElementById('g'+i+'-phone');
  if(!sel) return;
  const chosen = sel.options[sel.selectedIndex];
  if(!chosen || !chosen.value){
    if(idInput)    idInput.value = '';
    if(phoneInput) phoneInput.value = '';
    return;
  }
  const otherId = i===1 ? 2 : 1;
  const other = document.getElementById('g'+otherId+'-select');
  if(other && other.value === chosen.value){
    alert('यो सदस्य पहिले नै जमानीमा छान्नुभएको छ। कृपया अर्को सदस्य छान्नुहोस्।\n(This member is already selected as guarantor.)');
    sel.value = '';
    if(idInput)    idInput.value = '';
    if(phoneInput) phoneInput.value = '';
    return;
  }
  if(idInput)    idInput.value    = chosen.dataset.memberid || chosen.value;
  if(phoneInput) phoneInput.value = chosen.dataset.phone    || '';
};


  // ── Income/Expense auto-total ─────────────────────────
  const expIds = ['exp-1','exp-2','exp-3','exp-4','exp-5','exp-6'];
  const incIds = ['inc-1','inc-2','inc-3','inc-4','inc-5','inc-6','inc-7','inc-8'];
  [...expIds,...incIds].forEach(id=>{
    const inp = document.getElementById(id);
    if(inp) inp.addEventListener('input', ()=>{
      const expTotal = expIds.reduce((s,i)=>s+(Number(document.getElementById(i)?.value)||0),0);
      const incTotal = incIds.reduce((s,i)=>s+(Number(document.getElementById(i)?.value)||0),0);
      document.getElementById('total-exp').textContent = 'रु. '+expTotal.toLocaleString();
      document.getElementById('total-inc').textContent = 'रु. '+incTotal.toLocaleString();
    });
  });

  // ── Signature pad ─────────────────────────────────────
  const canvas = document.getElementById('sig-canvas');
  const ctx    = canvas.getContext('2d');
  let drawing  = false;
  const getPos = e => {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * (canvas.width / rect.width),
      y: (src.clientY - rect.top)  * (canvas.height / rect.height)
    };
  };
  canvas.addEventListener('mousedown',  e=>{drawing=true;ctx.beginPath();const p=getPos(e);ctx.moveTo(p.x,p.y);});
  canvas.addEventListener('mousemove',  e=>{if(!drawing)return;const p=getPos(e);ctx.lineWidth=1.5;ctx.strokeStyle='#003366';ctx.lineCap='round';ctx.lineTo(p.x,p.y);ctx.stroke();});
  canvas.addEventListener('mouseup',    ()=>drawing=false);
  canvas.addEventListener('mouseleave', ()=>drawing=false);
  canvas.addEventListener('touchstart', e=>{e.preventDefault();drawing=true;ctx.beginPath();const p=getPos(e);ctx.moveTo(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',  e=>{e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineWidth=1.5;ctx.strokeStyle='#003366';ctx.lineCap='round';ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
  canvas.addEventListener('touchend',   ()=>drawing=false);
}

function numberToNepaliWords(n){
  if(!n||isNaN(n)||n<=0) return '—';
  n = Math.round(n);
  const ones=['','एक','दुई','तीन','चार','पाँच','छ','सात','आठ','नौ',
    'दश','एघार','बाह्र','तेह्र','चौध','पन्ध्र','सोह्र','सत्र','अठार','उन्नाइस','बीस',
    'एक्काइस','बाईस','तेईस','चौबीस','पच्चीस','छब्बीस','सत्ताईस','अठ्ठाईस','उनन्तीस','तीस',
    'एकत्तीस','बत्तीस','तेत्तीस','चौंतीस','पैंतीस','छत्तीस','सैंतीस','अठ्तीस','उनन्चालीस','चालीस',
    'एकचालीस','बयालीस','त्रिचालीस','चौवालीस','पैंतालीस','छयालीस','सत्चालीस','अठचालीस','उनन्चास','पचास',
    'एकाउन्न','बाउन्न','त्रिपन्न','चउन्न','पचपन्न','छपन्न','सन्ताउन्न','अन्ठाउन्न','उनन्साठी','साठी',
    'एकसठ्ठी','बैसठ्ठी','त्रिसठ्ठी','चौंसठ्ठी','पैंसठ्ठी','छयसठ्ठी','सत्सठ्ठी','अठसठ्ठी','उनन्त्तर','सत्तरी',
    'एकहत्तर','बहत्तर','तिहत्तर','चौहत्तर','पचहत्तर','छहत्तर','सतहत्तर','अठहत्तर','उन्नासी','असी',
    'एकासी','बयासी','त्रियासी','चौरासी','पचासी','छयासी','सन्तासी','अठासी','उननब्बे','नब्बे',
    'एकानब्बे','ब्यानब्बे','त्रियानब्बे','चौरानब्बे','पन्चानब्बे','छ्यानब्बे','सन्तानब्बे','अन्ठानब्बे','उनन्सय','सय'];
  if(n<=100) return ones[n];
  if(n<1000){
    const h=Math.floor(n/100);
    const r=n%100;
    return ones[h]+' सय'+(r===0?'':' '+ones[r]);
  }
  if(n<100000){
    const t=Math.floor(n/1000);
    const r=n%1000;
    return numberToNepaliWords(t)+' हजार'+(r===0?'':' '+numberToNepaliWords(r));
  }
  if(n<10000000){
    const l=Math.floor(n/100000);
    const r=n%100000;
    return numberToNepaliWords(l)+' लाख'+(r===0?'':' '+numberToNepaliWords(r));
  }
  return numberToNepaliWords(Math.floor(n/10000000))+' करोड'+(n%10000000===0?'':' '+numberToNepaliWords(n%10000000));
}

async function submitLoanApplication(){
  const amount  = document.getElementById('lf-amount')?.value;
  const loanType = document.querySelector('input[name="loan-type"]:checked')?.value;
  const errEl   = document.getElementById('loan-app-err');
  const okEl    = document.getElementById('loan-app-ok');

  errEl.style.display='none';
  okEl.classList.add('hidden');

  if(!loanType){errEl.textContent='कृपया ऋणको किसिम छान्नुहोस् (Please select loan type).';errEl.style.display='block';return;}
  if(!amount||Number(amount)<=0){errEl.textContent='कृपया ऋण रकम भर्नुहोस् (Please enter loan amount).';errEl.style.display='block';return;}
  if(!document.getElementById('g1-select')?.value){errEl.textContent='कृपया कम्तीमा एक जमानी छान्नुहोस् (Please select at least one guarantor).';errEl.style.display='block';return;}

  const expTotal = ['exp-1','exp-2','exp-3','exp-4','exp-5','exp-6'].reduce((s,i)=>s+(Number(document.getElementById(i)?.value)||0),0);
  const incTotal = ['inc-1','inc-2','inc-3','inc-4','inc-5','inc-6','inc-7','inc-8'].reduce((s,i)=>s+(Number(document.getElementById(i)?.value)||0),0);

  // Capture signature BEFORE building req
  const canvas = document.getElementById('sig-canvas');
  const signatureData = canvas ? canvas.toDataURL('image/png') : '';

  showLoader('Submitting application...');
  const req = {
    id:              Date.now()+Math.floor(Math.random()*1000),
    memberId:        APP.currentUser.memberid||APP.currentUser.id,
    memberName:      APP.currentUser.fullname,
    loanType:        loanType,
    amount:          Number(amount),
    months:          document.getElementById('lf-months')?.value||'',
    date:            todayBS(),
    status:          'pending',
    totalExpense:    expTotal,
    totalIncome:     incTotal,
    guarantor1Name:  document.getElementById('g1-select')?.options[document.getElementById('g1-select')?.selectedIndex]?.text||'',
    guarantor1Id:    document.getElementById('g1-memberid')?.value||'',
    guarantor1Phone: document.getElementById('g1-phone')?.value||'',
    guarantor2Name:  document.getElementById('g2-select')?.options[document.getElementById('g2-select')?.selectedIndex]?.text||'',
    guarantor2Id:    document.getElementById('g2-memberid')?.value||'',
    guarantor2Phone: document.getElementById('g2-phone')?.value||'',
    collateral1:     document.getElementById('col1-name')?.value||'',
    signature:       signatureData,  // ← THIS was missing
  };

  console.log('Submitting req:', JSON.stringify(req).length, 'bytes', req);
  const result = await saveToSheet('LoanRequests', req);
  console.log('Result:', result);
  hideLoader();

  if(result&&!result.error){
    if(!APP.loanRequests) APP.loanRequests=[];
    APP.loanRequests.push(req);
    okEl.classList.remove('hidden');
    setTimeout(()=>{memberTab('apply-loan',document.querySelector('.msb-btn[onclick*="apply-loan"]'));},1500);
  } else {
    errEl.textContent='Submission failed. Please check your connection and try again.';
    errEl.style.display='block';
  }
}

async function submitProfileChangeRequest() {
  const m      = APP.currentUser;
  const reason = document.getElementById('ep-reason')?.value.trim();
  const errEl  = document.getElementById('ep-err');
  const okEl   = document.getElementById('ep-ok');

  errEl.style.display = 'none';
  okEl.classList.add('hidden');

  if (!reason) {
    errEl.textContent = 'Please provide a reason for the change request.';
    errEl.style.display = 'block';
    return;
  }

  showLoader('Submitting change request...');

  // Upload new photo if selected
  let newPhotoUrl = m.photourl || '';
  const photoFile = document.getElementById('ep-photo-inp')?.files[0];
  if (photoFile) {
    showLoader('Uploading photo...');
    const photoData = await new Promise(resolve => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = e => {
        img.onload = async () => {
          const canvas = document.createElement('canvas');
          const MAX = 400;
          let w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(photoFile);
    });

    const uploadRes = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'uploadFile',
        fileName: 'profile_' + (m.memberid||m.id) + '_' + Date.now() + '.jpg',
        base64Data: photoData,
        mimeType: 'image/jpeg'
      })
    });
    const uploadData = await uploadRes.json();
    if (uploadData && uploadData.url) newPhotoUrl = uploadData.url;
  }

  const request = {
    id:           Date.now() + Math.floor(Math.random() * 1000),
    memberId:     m.memberid || m.id,
    memberName:   m.fullname,
    requestedOn:  todayBS(),
    status:       'pending',
    reason:       reason,
    // Changed fields
    phone:        document.getElementById('ep-phone')?.value.trim() || m.phone || '',
    email:        document.getElementById('ep-email')?.value.trim() || m.email || '',
    occupation:   document.getElementById('ep-occ')?.value.trim()   || m.occupation || '',
    gender:       document.getElementById('ep-gender')?.value       || m.gender || '',
    address:      document.getElementById('ep-addr')?.value.trim()  || m.address || '',
    fathername:   document.getElementById('ep-father')?.value.trim()|| m.fathername || '',
    grandfathername: document.getElementById('ep-grand')?.value.trim() || m.grandfathername || '',
    spousename:   document.getElementById('ep-spouse')?.value.trim()|| m.spousename || '',
    photourl:     newPhotoUrl
  };

  const result = await saveToSheet('ProfileRequests', request);
  hideLoader();

  if (result && !result.error) {
    if (!APP.profileRequests) APP.profileRequests = [];
    APP.profileRequests.push(request);
    okEl.classList.remove('hidden');

    setTimeout(() => {
      memberTab('profile', document.querySelector('.msb-btn[onclick*="profile"]'));
    }, 2000);
  } else {
    errEl.textContent = 'Submission failed. Please check your connection and try again.';
    errEl.style.display = 'block';
  }
}

function safeParseAttendance(raw){
  if(!raw) return {};
  if(typeof raw==='object') return raw;
  try{ return JSON.parse(raw); }catch(e){ return {}; }
}

            <span style="font-size:20px">${ic}</span>

              <div style="font-size:12px;font-weight:700">${name}</div>
              <div style="font-size:10px;color:var(--muted)">${sub}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="alert alert-i" style="margin-top:12px;font-size:12px">
        ℹ️ For eSewa/Khalti/Bank — transfer to treasurer's account, take a screenshot, and upload below. Admin will verify and record your payment.
      </div>
    </div>

    <!-- PAYMENT FORM -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Submit New Payment</div>

      <div class="fgrid2">
        <div class="frow">
          <label>Payment Type <span style="color:var(--secondary)">*</span></label>
          <select id="pp-type" onchange="onPayTypeChange()" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
            <option value="monthly">💰 Monthly Dues</option>
            <option value="loan_repayment">📋 Loan Repayment</option>
            <option value="special">🎉 Special Contribution</option>
            <option value="initial">🏦 Initial Deposit</option>
          </select>
        </div>
        <div class="frow">
          <label>Payment Method <span style="color:var(--secondary)">*</span></label>
          <select id="pp-mode" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
            <option value="eSewa">🟢 eSewa</option>
            <option value="Khalti">🟣 Khalti</option>
            <option value="Bank Transfer">🏦 Bank Transfer</option>
            <option value="Cash">💵 Cash</option>
            <option value="Online">📱 Online Transfer</option>
          </select>
        </div>
      </div>

      <!-- Month/Year — always shown -->
      <div class="fgrid2">
        <div class="frow">
          <label>Month <span style="color:var(--secondary)">*</span></label>
          <select id="pp-month" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
            ${BS_MONTHS.map((mn,i)=>`<option value="${mn}" ${i===currentMonthIdx?'selected':''}>${mn}${paidMonths.has(mn+' '+currentBSYear)?' ✅':pendingMonths.has(mn+' '+currentBSYear)?' ⏳':''}</option>`).join('')}
          </select>
        </div>
        <div class="frow">
          <label>Year <span style="color:var(--secondary)">*</span></label>
          <select id="pp-year" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
            ${Array.from({length:5},(_,i)=>currentBSYear-i).map(y=>`<option value="${y}" ${y===currentBSYear?'selected':''}>${y}</option>`).join('')}
          </select>
        </div>
      </div>

      <!-- Loan repayment fields -->
      <div id="pp-loan-fields" style="display:none">
        <div class="frow">
          <label>Select Loan <span style="color:var(--secondary)">*</span></label>
          <select id="pp-loan-id" onchange="onLoanSelectChange(this)"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
            ${(()=>{
              const myLoans=APP.loans.filter(l=>{
                const lMem=String(l.memberId||'').trim();
                return(lMem===mId||lMem===String(m.id)||lMem===String(m.memberid))&&l.status==='active';
              });
              if(myLoans.length===0)return'<option value="">No active loans found</option>';
              return myLoans.map(l=>{
                const calc=calcLoan(l.amount,l.rate,l.months);
                const monthly=Number(l.monthlyInstallment)||calc.monthlyInstallment;
                const totalPayable=Number(l.totalPayable)||calc.totalPayable;
                const repaid=Number(l.repaid)||0;
                const remaining=Math.max(0,totalPayable-repaid);
                const installmentsDone=APP.dues.filter(d=>(String(d.memberId)===mId||String(d.memberId)===String(m.id))&&d.type==='loan_repayment'&&String(d.loanId)===String(l.id)).length;
                return`<option value="${l.id}" data-monthly="${monthly}" data-remaining="${remaining}" data-done="${installmentsDone}" data-months="${l.months}">
                  Loan #${l.id} — Installment ${installmentsDone+1}/${l.months} — Monthly: Rs ${monthly.toLocaleString()} — Remaining: Rs ${remaining.toLocaleString()}
                </option>`;
              }).join('');
            })()}
          </select>
          <div id="pp-loan-detail" style="margin-top:8px;display:none;background:#f0f4ff;border:1px solid #c7d7ff;border-radius:8px;padding:10px">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
              <div><div style="font-size:10px;color:var(--muted);font-weight:700">MONTHLY INSTALLMENT</div><div style="font-size:14px;font-weight:700;color:var(--primary)" id="pp-loan-monthly">—</div></div>
              <div><div style="font-size:10px;color:var(--muted);font-weight:700">REMAINING LOAN</div><div style="font-size:14px;font-weight:700;color:var(--secondary)" id="pp-loan-remaining">—</div></div>
              <div><div style="font-size:10px;color:var(--muted);font-weight:700">INSTALLMENT NO.</div><div style="font-size:14px;font-weight:700;color:var(--success)" id="pp-loan-installment">—</div></div>
            </div>
          </div>

        </div>
      </div>

      <!-- Special fields -->
      <div id="pp-special-fields" style="display:none">
        <div class="frow">
          <label>Occasion <span style="color:var(--secondary)">*</span></label>
          <select id="pp-occasion" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
            <option>Birthday</option>
            <option>Anniversary</option>
            <option>Festival</option>
            <option>Wedding</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="fgrid2">
        <div class="frow">
          <label>Amount (Rs) <span style="color:var(--secondary)">*</span></label>
          <input type="number" id="pp-amount" value="1100" placeholder="e.g. 1100"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
        </div>
        <div class="frow">
          <label>Payment Date (BS) <span style="color:var(--secondary)">*</span></label>
          <input type="text" id="pp-date" value="${todayBS()}" maxlength="10"
            oninput="formatBSInputMem(this)" placeholder="YYYY-MM-DD"
            style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
        </div>
      </div>

      <div class="frow">
        <label>Transaction ID / Reference <span style="color:var(--muted);font-weight:400">(optional but recommended)</span></label>
        <input type="text" id="pp-txn" placeholder="e.g. eSewa transaction ID, bank ref number"
          style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
      </div>

      <div class="frow">
        <label>Note <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="text" id="pp-note" placeholder="Any additional information"
          style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px">
      </div>

      <!-- Screenshot Upload -->
      <div class="frow">
        <label>Payment Screenshot / Receipt <span style="color:var(--secondary)">*</span></label>
        <div id="pp-upload-box"
          onclick="document.getElementById('pp-receipt-inp').click()"
          style="border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;background:var(--light);transition:all 0.2s">
          <div id="pp-upload-icon" style="font-size:32px;margin-bottom:8px">📸</div>
          <div id="pp-upload-label" style="font-size:13px;font-weight:600;color:var(--primary)">Click to upload screenshot</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px">JPG, PNG or PDF — max 2MB</div>
        </div>
        <input type="file" id="pp-receipt-inp" accept="image/*,.pdf" style="display:none">
      </div>

      <!-- Preview -->
      <div id="pp-img-preview" style="display:none;margin-bottom:14px">
        <img id="pp-img-prev-img" style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);object-fit:contain">
      </div>

      <div class="alert alert-e hidden" id="pp-err" style="margin-top:4px"></div>

      <button onclick="submitPaymentRequest()"
        style="width:100%;padding:11px;background:var(--primary);color:white;border:none;border-radius:8px;
          font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px">
        📤 Submit Payment for Verification
      </button>
    </div>

    <!-- PAYMENT HISTORY -->
    <div class="card">
      <div class="card-title">My Payment Requests
        <span style="font-size:11px;font-weight:400;color:var(--muted)">${myPayments.length} total</span>
      </div>
      ${myPayments.length===0
        ?'<p style="font-size:13px;color:var(--muted)">No payment requests submitted yet.</p>'
        :`<div style="display:flex;flex-direction:column;gap:10px">
          ${[...myPayments].reverse().map(p=>`
            <div style="padding:12px 14px;border-radius:10px;border:1px solid ${p.status==='approved'?'#86efac':p.status==='rejected'?'#fca5a5':'#fde68a'};background:${p.status==='approved'?'#f0fdf4':p.status==='rejected'?'#fff5f5':'#fffbf0'}">
              <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
                <div>
                  <div style="font-size:13px;font-weight:700;color:var(--text)">${p.type==='monthly'?'Monthly Dues':p.type==='loan_repayment'?'Loan Repayment':p.type==='special'?'Special — '+(p.occasion||''):p.type==='initial'?'Initial Deposit':p.type}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px">${p.month||''} · ${p.paymode||''} · ${fmtDate(p.date)}</div>
                  ${p.txnId?`<div style="font-size:11px;color:#185FA5;margin-top:2px">Ref: ${p.txnId}</div>`:''}
                  ${p.rejectReason?`<div style="font-size:11px;color:var(--secondary);margin-top:3px">Reason: ${p.rejectReason}</div>`:''}
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                  <div style="font-size:16px;font-weight:700;color:var(--primary)">Rs ${Number(p.amount).toLocaleString()}</div>
                  <span class="badge ${p.status==='approved'?'bv':p.status==='rejected'?'br':'bp'}">
                    ${p.status==='approved'?'✅ Approved':p.status==='rejected'?'❌ Rejected':'⏳ Pending'}
                  </span>
                  ${p.receiptUrl?`<a href="${p.receiptUrl}" target="_blank"
                    style="font-size:11px;color:#185FA5;padding:3px 8px;border:1px solid #93c5fd;border-radius:6px;text-decoration:none">
                    🧾 Receipt
                  </a>`:''}
                </div>
              </div>
            </div>`).join('')}
        </div>`}
    </div>`;

  // file input change handler
  setTimeout(()=>{
    const inp=document.getElementById('pp-receipt-inp');
    if(inp)inp.addEventListener('change',function(){
      if(!this.files||!this.files[0])return;
      const box=document.getElementById('pp-upload-box');
      const icon=document.getElementById('pp-upload-icon');
      const lbl=document.getElementById('pp-upload-label');
      if(box){box.style.borderColor='var(--success)';box.style.background='#f0fdf4';}
      if(icon)icon.textContent='✅';
      if(lbl)lbl.textContent=this.files[0].name;
      // show image preview
      if(this.files[0].type.startsWith('image/')){
        const reader=new FileReader();
        reader.onload=e=>{
          const prev=document.getElementById('pp-img-preview');
          const img=document.getElementById('pp-img-prev-img');
          if(prev)prev.style.display='block';
          if(img)img.src=e.target.result;
        };
        reader.readAsDataURL(this.files[0]);
      }
    });
  },100);
}


function onPayTypeChange(){
  const type=document.getElementById('pp-type')?.value;
  document.getElementById('pp-loan-fields').style.display=
    type==='loan_repayment'?'block':'none';
  document.getElementById('pp-special-fields').style.display=
    type==='special'?'block':'none';

  // hide loan detail when switching away
  const detail=document.getElementById('pp-loan-detail');
  if(detail&&type!=='loan_repayment')detail.style.display='none';

  // set default amounts
  const amounts={monthly:1100,initial:5000,special:500};
  const amtEl=document.getElementById('pp-amount');

  if(type==='loan_repayment'){
    // trigger loan select change to auto-fill amount
    const loanSel=document.getElementById('pp-loan-id');
    if(loanSel&&loanSel.value){
      onLoanSelectChange(loanSel);
    } else {
      if(amtEl)amtEl.value='';
    }
  } else {
    if(amtEl&&amounts[type]!==undefined)amtEl.value=amounts[type]||'';
  }
}

function formatBSInputMem(el){
  let v=el.value.replace(/[^0-9]/g,'');
  if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);
  if(v.length>7)v=v.slice(0,7)+'-'+v.slice(7);
  if(v.length>10)v=v.slice(0,10);
  el.value=v;
}

async function submitPaymentRequest(){
  const m=APP.currentUser;
  const mId=String(m.memberid||m.id);
  const type=document.getElementById('pp-type')?.value;
  const amount=Number(document.getElementById('pp-amount')?.value);
  const date=document.getElementById('pp-date')?.value;
  const paymode=document.getElementById('pp-mode')?.value;
  const txnId=document.getElementById('pp-txn')?.value.trim();
  const note=document.getElementById('pp-note')?.value.trim();
  const errEl=document.getElementById('pp-err');
  errEl.classList.add('hidden');

  if(!amount||amount<=0){errEl.textContent='Please enter a valid amount.';errEl.classList.remove('hidden');return;}
  if(!date){errEl.textContent='Please enter payment date.';errEl.classList.remove('hidden');return;}

  const receiptFile=document.getElementById('pp-receipt-inp')?.files[0];
  if(!receiptFile&&paymode!=='Cash'){
    errEl.textContent='Please upload a payment screenshot or receipt.';
    errEl.classList.remove('hidden');return;
  }

  // build month label
  const monthName=document.getElementById('pp-month')?.value||'';
  const year=document.getElementById('pp-year')?.value||todayBS().split('-')[0];
  const occasion=document.getElementById('pp-occasion')?.value||'';
  const loanId=document.getElementById('pp-loan-id')?.value||'';
  const month=type==='monthly'?monthName
    :type==='special'?occasion
    :type==='loan_repayment'?monthName
    :type==='initial'?monthName
    :monthName;

  showLoader('Uploading receipt...');
  let receiptUrl='';
  if(receiptFile){
    const result=await uploadFileMem(receiptFile,'payment_'+mId+'_'+Date.now());
    receiptUrl=result||'';
  }

  showLoader('Submitting payment request...');
  const req={
    id:Date.now()+Math.floor(Math.random()*1000),
    memberId:mId,
    memberName:m.fullname,
    type,
    amount,
    date,
    month,
    year:String(year),
    paymode,
    txnId:txnId||'',
    note:note||'',
    loanId:loanId||'',
    occasion:type==='special'?occasion:'',
    receiptUrl,
    status:'pending',
    submittedOn:todayBS(),
    approvedOn:'',
    rejectedOn:'',
    adminNote:'',
    rejectReason:''
  };

  if(!APP.paymentRequests)APP.paymentRequests=[];
  APP.paymentRequests.push(req);
  const res=await saveToSheet('PaymentRequests',req);
  hideLoader();

  if(res&&!res.error){
    // notify admin via notification
    await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({
      action:'insert',sheet:'Notifications',
      data:{
        id:Date.now()+1,memberid:'admin',
        title:'💳 Payment Proof Submitted',
        body:`${m.fullname} (${mId}) submitted Rs ${amount.toLocaleString()} for ${month} ${year} via ${paymode}`,
        time:todayBS(),read:'false',type:'warning',icon:'💳'
      }
    })});
    alert(`✅ Payment submitted successfully!\n\nAdmin will verify your payment and record it shortly.\n\nAmount: Rs ${amount.toLocaleString()}\nType: ${type}\nMethod: ${paymode}`);
    memberTab('pay-dues',document.querySelector('.msb-btn[onclick*="pay-dues"]'));
  } else {
    errEl.textContent='Submission failed. Please check your connection and try again.';
    errEl.classList.remove('hidden');
  }
}

async function uploadFileMem(file,label){
  return new Promise(resolve=>{
    if(!file){resolve(null);return;}
    if(file.size>2*1024*1024){alert('File too large. Maximum 2MB.');resolve(null);return;}
    if(file.type.startsWith('image/')){
      const img=new Image();const reader=new FileReader();
      reader.onload=e=>{
        img.onload=async()=>{
          const canvas=document.createElement('canvas');
          const MAX=800;let w=img.width,h=img.height;
          if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          const base64=canvas.toDataURL('image/jpeg',0.75).split(',')[1];
          try{
            const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'uploadFile',fileName:label+'.jpg',base64Data:base64,mimeType:'image/jpeg'})});
            const data=await res.json();resolve(data.url||data.viewUrl||null);
          }catch(e){resolve(null);}
        };
        img.src=e.target.result;
      };
      reader.readAsDataURL(file);
    } else {
      const reader=new FileReader();
      reader.onload=async e=>{
        const base64=e.target.result.split(',')[1];
        try{
          const res=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'uploadFile',fileName:label+'_'+file.name,base64Data:base64,mimeType:file.type})});
          const data=await res.json();resolve(data.url||data.viewUrl||null);
        }catch(e){resolve(null);}
      };
      reader.readAsDataURL(file);
    }
  });
}
function onLoanSelectChange(sel){
  const opt=sel.options[sel.selectedIndex];
  const detail=document.getElementById('pp-loan-detail');
  const amtEl=document.getElementById('pp-amount');
  if(!opt||!opt.value){
    if(detail)detail.style.display='none';
    return;
  }
  const monthly=Number(opt.getAttribute('data-monthly')||0);
  const remaining=Number(opt.getAttribute('data-remaining')||0);
  const done=Number(opt.getAttribute('data-done')||0);
  const months=Number(opt.getAttribute('data-months')||0);

  // auto-fill amount with monthly installment
  if(amtEl)amtEl.value=monthly;

  // show detail card
  if(detail)detail.style.display='block';
  const mEl=document.getElementById('pp-loan-monthly');
  const rEl=document.getElementById('pp-loan-remaining');
  const iEl=document.getElementById('pp-loan-installment');
  if(mEl)mEl.textContent='Rs '+monthly.toLocaleString();
  if(rEl)rEl.textContent='Rs '+remaining.toLocaleString();
  if(iEl)iEl.textContent=(done+1)+' of '+months;
}
</script>
