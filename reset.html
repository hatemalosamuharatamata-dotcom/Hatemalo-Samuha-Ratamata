<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Hatemalo Samuha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Poppins',sans-serif;background:#f4f7f6;display:flex;
    align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:white;border-radius:16px;padding:32px;width:100%;
    max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
  .logo{text-align:center;margin-bottom:24px}
  .logo h1{color:#003366;font-size:20px}
  .logo p{color:#6b7280;font-size:12px;margin-top:4px}
  .frow{margin-bottom:16px}
  .frow label{display:block;font-size:12px;font-weight:700;
    color:#374151;margin-bottom:6px}
  .frow input{width:100%;padding:10px 14px;border:1px solid #e5e7eb;
    border-radius:8px;font-size:14px;font-family:'Poppins',sans-serif}
  .frow input:focus{outline:none;border-color:#003366}
  .btn{width:100%;padding:12px;background:#003366;color:white;border:none;
    border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:'Poppins',sans-serif}
  .btn:hover{background:#002244}
  .alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
  .alert-e{background:#fee2e2;color:#991b1b}
  .alert-s{background:#dcfce7;color:#166534}
  .hidden{display:none}
  .spinner{text-align:center;padding:20px;color:#6b7280;font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>हातेमालो समुह</h1>
    <p>Password Reset</p>
  </div>

  <div id="verifying" class="spinner">Verifying your reset link...</div>

  <div id="reset-form" class="hidden">
    <div class="alert alert-s" style="margin-bottom:16px">
      ✅ Link verified. Please set your new password.
    </div>
    <div class="frow">
      <label>New Password *</label>
      <input type="password" id="new-pass" placeholder="Enter new password">
    </div>
    <div class="frow">
      <label>Confirm Password *</label>
      <input type="password" id="confirm-pass" placeholder="Confirm new password">
    </div>
    <div class="alert alert-e hidden" id="err"></div>
    <button class="btn" onclick="doReset()">Set New Password</button>
  </div>

  <div id="error-view" class="hidden">
    <div class="alert alert-e" id="token-err"></div>
    <a href="index.html" style="display:block;text-align:center;
      margin-top:14px;color:#003366;font-size:13px">← Back to Login</a>
  </div>

  <div id="success-view" class="hidden">
    <div class="alert alert-s">
      ✅ Password reset successfully! You can now login with your new password.
    </div>
    <a href="index.html" style="display:block;text-align:center;
      margin-top:14px;color:#003366;font-size:13px;font-weight:700">
      → Go to Login
    </a>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8Lcwa0h_tDLFBWkEKMfOn8hAdJ_5gn9nUzHpuBgruBEYKpdYXB9Vf6fVltk0bvvCi/exec';
const token = new URLSearchParams(window.location.search).get('token');

async function hashPassword(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Verify token on page load
(async function() {
  if (!token) {
    document.getElementById('verifying').classList.add('hidden');
    document.getElementById('token-err').textContent = 'Invalid reset link. Please request a new one.';
    document.getElementById('error-view').classList.remove('hidden');
    return;
  }
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'verifyResetToken', token })
    });
    const data = await res.json();
    document.getElementById('verifying').classList.add('hidden');
    if (data.success) {
      document.getElementById('reset-form').classList.remove('hidden');
    } else {
      document.getElementById('token-err').textContent = data.error || 'Invalid or expired link.';
      document.getElementById('error-view').classList.remove('hidden');
    }
  } catch(e) {
    document.getElementById('verifying').classList.add('hidden');
    document.getElementById('token-err').textContent = 'Connection error. Please try again.';
    document.getElementById('error-view').classList.remove('hidden');
  }
})();

async function doReset() {
  const pass    = document.getElementById('new-pass').value;
  const confirm = document.getElementById('confirm-pass').value;
  const errEl   = document.getElementById('err');
  errEl.classList.add('hidden');

  if (!pass || pass.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.';
    errEl.classList.remove('hidden'); return;
  }
  if (pass !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    errEl.classList.remove('hidden'); return;
  }

  const hashed = await hashPassword(pass);
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'resetPassword', token, newPassword: hashed })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('success-view').classList.remove('hidden');
    } else {
      errEl.textContent = data.error || 'Reset failed. Please try again.';
      errEl.classList.remove('hidden');
    }
  } catch(e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.classList.remove('hidden');
  }
}
</script>
</body>
</html>
